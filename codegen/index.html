<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <title>Code-gen</title>
    <style>
        .w-300 {
            width: 300px;
        }

        .text-mono {
            font-family: monospace;
        }
    </style>
</head>

<body>
    <h5 class="card-title bg-secondary p-4 text-white m-0">❄️❄️ Norwegian nummber generator ❄️❄️</h5>
    <div class="card ">
        <div class="card-body">

            <div class="input-group mb-3 w-300">
                <div class="input-group-prepend">
                    <button class="btn btn-outline-secondary" type="button" id="button-add">+ 10</button>
                </div>
                <input id="input-batch-size" type="text" class="form-control" disabled>
                <div class="input-group-append">
                    <button class="btn btn-outline-secondary" type="button" id="button-remove">- 10</button>
                </div>
            </div>
            <button id="generate" class="btn btn-primary">Generate</button>
            <div id="list" class="mt-4 border p-4">
                <div>⭐ click generate to get some codes!</div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
        integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
        crossorigin="anonymous"></script>
    <script>
        let batch
        size = 10;
        $('#button-add').click(() => {
            size += 10;
            update();
        });
        $('#button-remove').click(() => {
            size -= 10;
            if (size < 10) size = 10;
            update();
        });
        $('#generate').click(() => {
            $('#list').empty();
            let codes = [];
            let letter = 'abcdefghijklmnopqrstuvwxyz'.split('');
            for (let i = 0; i < size; i++) {
                let code = letter[Math.floor(Math.random() * letter.length)];
                codes.push(`${code}${Math.floor(Math.random() * 1000).toString().padStart(3, '0')}`);
            }
            codes.forEach(c => $('#list').append(`<div>⭐ <span class="text-mono">${c}</span></div>`));
        });
        function update() {
            $('#input-batch-size').val(`${size}`);
        }
        update();
    </script>
</body>

</html>
