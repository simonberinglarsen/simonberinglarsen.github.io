<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A3MC</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
</head>

<body>
    <div class="version"></div>
    <header>
        <div class="header-background py-3">
            <div data-aos="fade-down" data-aos-duration="1000" data-aos-delay="1000" class="header text-align-left">
                <div class="header-title py-2 px-3">
                    <p class="mb-1">
                        "Companyname A/S"
                    </p>
                    <h1 class="text-gold">The Wonder Team</h1>
                    <p id="header-description" class="text-gray py-2"></p>
                    <p>
                        <i class="fab fa-twitter"></i>
                        <span class="mx-1">/</span>
                        <i class="fab fa-linkedin"></i>
                        <span class="mx-1">/</span>
                        <i class="fab fa-facebook"></i>
                        <span class="mx-1">/</span>
                        <i class="fab fa-google-plus-g"></i>
                    </p>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="main-content text-align-left py-3">
            <p class="text-gray">
                Discover
            </p>
            <h1 class="mb-3 text-gold">Projects</h1>
            <div id="project-template" data-aos="fade-left" data-aos-duration="1000"
                class="bg-light mb-4 d-none rounded">
                <div class="project">
                    <div class="project-body rounded flex-row">
                        <div class="project-logo">
                        </div>
                        <div class="flex-column w-100">
                            <div class="ml-1 project-description flex-row">
                                <div class="project-logo small-logo">
                                </div>
                                <div>
                                    <div class="cmd-title"></div>
                                    <div class="cmd-slogan mt-1 text-gray"></div>
                                </div>
                                <div class="ml-auto fixed-size-1 flex-row">
                                    <div class="media-links text-dark ml-auto mt-1"></div>
                                </div>
                            </div>
                            <div class="media-links mobile">
                            </div>
                            <div class="terminal project-console flex-fill">
                                <span class="prompt">$></span>
                                <span class="cmd-description mb-3"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <div class="footer ml-3 py-3">
            <p class="text-gray">
                Reach out to us
            </p>
            <h1 class="mb-3 text-gold">Contact</h1>
            <div class="contact-card rounded">
                <div class="p-2 flex-row">
                    <div class="px-3">
                        <div><i class="far fa-envelope fa-2x text-gold"></i></div>
                        <span class="text-gray">email</span>
                    </div>
                    <div>a3mc@protonmail.com</div>
                </div>
                <div class="p-2 flex-row">
                    <div class="px-3">
                        <div><i class="fas fa-key fa-2x text-gold"></i></div>
                        <span class="text-gray">PGP</span>
                    </div>
                    <div class="font-size-small">3E5DAE8A18V42017E28347B95C5631581B71021A</div>
                </div>
                <div class="p-2 flex-row">
                    <div class="px-3">
                        <div><i class="fab fa-keybase fa-2x text-gold"></i></div>
                        <span class="text-gray">Keybase</span>
                    </div>
                    <div>art3mis</div>
                </div>
            </div>

        </div>
    </footer>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/typeit@7.0.4/dist/typeit.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
