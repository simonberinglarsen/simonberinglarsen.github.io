<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/all.min.css">
</head>

<body>
    <header class="mb-3">
        <div class="header row center">
            <div class="column center">
                <div class="header-title py-2 px-3">
                    <p class="mb-1">
                        "Companyname A/S"
                    </p>
                    <h1 class="text-gold">The Wonder Team</h1>
                    <p id="header-description" class="mb-2 text-gray"></p>
                    <p>
                        <i class="fab fa-twitter"></i>
                        <span class="mx-1">/</span>
                        <i class="fab fa-linkedin"></i>
                        <span class="mx-1">/</span>
                        <i class="fab fa-facebook"></i>
                        <span class="mx-1">/</span>
                        <i class="fab fa-google-plus-g"></i>
                    </p>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="main-content">
            <p class="text-gray">
                Discover
            </p>
            <h1 class="mb-3 text-gold">Projects</h1>
            <div id="project-template" class="project mb-3 d-none">
                <div class="project-body rounded row">
                    <div class="project-logo">
                    </div>
                    <div class="column w-100">
                        <div class="ml-1 project-description">
                            <div class="mb-1">
                                <span class="cmd-title"></span>
                            </div>
                            <div class="mb-1">
                                <span class="prompt">$></span>
                                <span class="cmd-slogan text-green"></span>
                            </div>
                        </div>
                        <div class="project-console flex-fill">
                            <span class="cmd-description text-gray mb-3"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <div class="footer ml-3 py-3">
            <p class="text-gray">
                Reach out to us
            </p>
            <h1 class="mb-3 text-gold">Contact</h1>
            <div class="row">
                <div class="contact-card rounded px-3 py-2 row">
                    <div>
                        <div class="text-gray text-bold mb-2">Email</div>
                        <div class="mb-1">mail1@domain.com</div>
                        <div class="mb-1">mail2@domain.com</div>
                    </div>
                    <div class="column center ml-3"><i class="far fa-envelope fa-2x text-gold"></i></div>
                </div>
                <div class="contact-card rounded px-3 py-2 ml-3 row">
                    <div>
                        <div class="text-gray text-bold mb-2">Twitter</div>
                        <div class="mb-1">@twitterHandle</div>
                    </div>
                    <div class="column center ml-3"><i class="fab fa-twitter fa-2x text-gold"></i></div>
                </div>
            </div>

        </div>
    </footer>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/typeit@7.0.4/dist/typeit.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
