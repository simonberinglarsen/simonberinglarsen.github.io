<!DOCTYPE html>
<html>

<head>
    <style>
        .box {
            border: 1px solid black;
            margin: 40px;
            padding: 40px;
        }

        .error {
            color: red;
            height: 40px;
        }
    </style>
</head>

<body>
    <div>⭐ press f12 and go to console to view output</div>
    <div>⭐ rightclick + view source to see how its make</div>
    <div class="box">
        <form>
            <label for="name">First name:</label><br>
            <input type="text" id="name" name="name" oninput="validation()"><br>
            <div class="error" id="nameValidation">😥 invalid name</div>
            <label for="age">Last name:</label><br>
            <input type="text" id="age" name="age" oninput="validation()">
            <div class="error" id="ageValidation">😥 invalid age</div>
        </form>
    </div>
    <script>
        /*

        Find and store the elements from array that start with 'ab'. The first two characters of the string  should be ab ONLY.
       Given array names =  ["abcdef","acdef","adelf","abbjkl","bcdefh","cdefij","abzxeft","aghef","abmnop", "aabb","ab","123456"]
       Output array answer = ["abcdef","abbjkl","abzxeft","abmnop","ab"]

        */
        let givenArrayNames = ["abcdef", "acdef", "adelf", "abbjkl", "bcdefh", "cdefij", "abzxeft", "aghef", "abmnop", "aabb", "ab", "123456"]
        let output = [];
        for (let i = 0; i < givenArrayNames.length; i++) {
            if (givenArrayNames[i].indexOf('ab') === 0) {
                output.push(givenArrayNames[i]);
            }
        }
        console.log(`results: ${JSON.stringify(output)}`);

        /*

        Create a form and add two form elements - a text field for Name and a text field for age.

        Validation conditions :

        1. Name should be only between 5 to 10 characters. If a user enters the name below 5 characters and above 10 then alert the user saying invalid name.

        2. Age entered by the user should be between 5 to 25 . When a user enters less than 5 or more than 25 then alert saying a invalid age.

        Example :
        Name = “abc” //invalid name
        Name = “abcdef” // valid name

        Age = 4 // invalid age
        Age = 32 // Invalid age

        */
        function validation() {
            const name = document.getElementById('name').value;
            const age = +document.getElementById('age').value;
            document.getElementById('nameValidation').innerHTML = "&nbsp;";
            document.getElementById('ageValidation').innerHTML = "&nbsp;";
            if(name.length < 5 || name.length > 10) {
                document.getElementById('nameValidation').innerHTML = "😥 invalid name";
            }
            if(age < 5 || age > 25) {
                document.getElementById('ageValidation').innerHTML = "😥 invalid age";
            }
            return true;
        }

    </script>

</body>

</html>
