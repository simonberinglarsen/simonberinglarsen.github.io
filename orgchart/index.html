<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Calibri, 'Gill Sans', 'Gill Sans MT', 'Trebuchet MS', sans-serif;
            font-size: 20px;
        }

        .box {
            position: absolute;
            border: 2px solid black;
            border-radius: 5px;
            padding: 10px 20px;
            font-weight: bold;
            text-align: center;
        }

        .box-brown {
            background-color: rgb(196, 189, 155);
        }

        .box-light-brown {
            background-color: rgb(220, 217, 197);
        }

        .box-blue {
            background-color: rgb(223, 237, 242);
        }

        .box-purple {
            background-color: rgb(202, 194, 215);
        }

        .table {
            position: absolute;
            left: 57px;
            top: 163px;
            font-weight: bold;
            border-collapse: collapse;
        }

        .table td {
            padding: 10px;
            border: 3px solid black;
        }

        .center {
            text-align: center;
        }

        .table-header {
            background-color: rgb(217,217,217);
        }

        .header {
            position: absolute;
            left: 57px;
            top: 33px;
            font-size: 40px;
            font-weight: bold;
            padding-bottom: 14px;
            border-bottom: 2px solid black;
            width: 2000px;
        }
    </style>
</head>

<body>
    <div class="header">
        HUMAN RESOURCES
    </div>
    <table class="table">
        <tr class="table-header">
            <td colspan="2">
                <div class="center">1234</div>
            </td>
        </tr>
        <tr>
            <td>NAME & SURNAME:</td>
            <td>LUNGI MAETA</td>
        </tr>
        <tr>
            <td>DESIGNATION:</td>
            <td>CHIEF HUMAN RESOURCE OFFICER</td>
        </tr>
        <tr>
            <td>SIGNATURE:</td>
            <td></td>
        </tr>
        <tr>
            <td>DATE:</td>
            <td></td>
        </tr>
    </table>
    <svg width="2000" height="2000">
    </svg>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script>
        function addLine(x1, y1, x2, y2, attr2) {
            if (x1 === x2 || y1 === y2) {
                $(document.createElementNS('http://www.w3.org/2000/svg', 'line')).attr({
                    ...attr2,
                    x1, y1, x2, y2,
                    'stroke': 'black',
                    'stroke-width': 2
                }).appendTo('svg');
                return this;
            }
            $(document.createElementNS('http://www.w3.org/2000/svg', 'line')).attr({
                'x1': x1, 'y1': y1, 'x2': x1, 'y2': y2,
                'stroke': 'black',
                'stroke-width': 2
            }).appendTo('svg');
            $(document.createElementNS('http://www.w3.org/2000/svg', 'line')).attr({
                'x1': x1, 'y1': y2, 'x2': x2, 'y2': y2,
                'stroke': 'black',
                'stroke-width': 2
            }).appendTo('svg');
            return this;
        }
        function Box() {
            let x1, y1, w, cx, cy, center;

            function add(x, y, type, html) {
                this.x1 = x;
                this.y1 = y;
                const box = $(`<div class="box ${type}" style="top:${y}px;left:${x}px;">${html}</div>`);
                $('body').append(box);
                this.w = box.outerWidth();
                this.h = box.outerHeight();
                this.cx = this.x1 + Math.floor(this.w / 2);
                this.cy = this.y1 + Math.floor(this.h / 2);
                this.center = { x: this.cx, y: this.cy };
                return this;
            }
            function lineTo(anchor) {
                const x2 = anchor.x;
                const y2 = anchor.y;
                const x1 = this.cx;
                const y1 = this.y1;
                addLine(x1, y1, x2, y2);
                return this;
            }
            return {
                add,
                lineTo
            };
        }


        function randomName() {
            const count = Math.floor(Math.random() * 3) + 3;
            const rnd = [];
            for (let i = 0; i < count; i++) {
                let name = Math.random().toString(36).substring(4, 8).toUpperCase();
                rnd.push(name);
            }
            const list = rnd.reduce((p, c) => `${p}<br/>${c}`);
            return list;
        }

        let anchor;
        let chief = new Box().add(800, 158, 'box-brown', 'CHIEF HUMAN RESOURCE OFFICER<br/>JOGN SMITH');
        let assist = new Box().add(1453, 259, 'box-purple', 'PERSONAL ASSISTANT<br/>' + randomName());
        let b1 = new Box().add(174, 419, 'box-light-brown', 'GENERAL MANAGER<br/>' + randomName());
        let b2 = new Box().add(1335, 419, 'box-light-brown', 'GENERAL MANAGER<br/>' + randomName());
        addLine(b1.cx, b1.y1 + 20, b2.cx, b1.y1 + 20);
        addLine(chief.cx, chief.cy, chief.cx, b1.y1 + 20);
        addLine(assist.cx, assist.cy, chief.cx, assist.cy, { 'stroke-dasharray': '4 2' });


        let man1 = new Box().add(630, 553, 'box-blue', '<br/>ADMIN MANAGER<br/>CANDICE PORTER<br/>').lineTo(b1.center);
        new Box().add(1673, 553, 'box-blue', '<br/>ADMIN MANAGER<br/>CANDICE PORTER<br/>');

        let t1 = new Box().add(437, 685, 'box-blue', 'TRAINING ADMIN<br/>' + randomName());
        let t2 = new Box().add(873, 685, 'box-blue', 'LEARNING ADMIN<br/>' + randomName());
        addLine(t1.cx, t1.y1 + 50, t2.cx, t1.y1 + 50);
        addLine(man1.cx, man1.cy, man1.cx, t1.y1 + 50);

        new Box().add(1673, 685, 'box-blue', 'TRAINING ADMIN<br/>1234').lineTo(b2.center);

        anchor = { x: b1.cx, y: 895 - 40 };
        new Box().add(17, 895, 'box-blue', 'John Doe<br/>12341').lineTo(anchor);
        new Box().add(177, 895, 'box-blue', randomName()).lineTo(anchor);
        let d1 = new Box().add(311, 895, 'box-blue', randomName()).lineTo(anchor);
        let d2 = new Box().add(459, 895, 'box-blue', randomName()).lineTo(anchor);
        let d3 = new Box().add(581, 895, 'box-blue', randomName()).lineTo(anchor);
        let d4 = new Box().add(709, 895, 'box-blue', randomName()).lineTo(anchor);
        let d5 = new Box().add(853, 895, 'box-blue', randomName()).lineTo(anchor);
        let d6 = new Box().add(995, 895, 'box-blue', randomName()).lineTo(anchor);
        addLine(anchor.x, anchor.y, b1.cx, b1.cy)

        let anchor2 = { x: 1513, y: 825 };
        addLine(b2.cx, b2.cy, b2.cx, anchor2.y);
        new Box().add(1177, 895, 'box-blue', 'MANAGER: SETA<br/>1234<br/>1324');
        new Box().add(1479, 895, 'box-blue', 'MANAGER: EXTERNAL<br/>1234<br/>1324');
        new Box().add(1767, 895, 'box-blue', 'MANAGER: EXTERNAL<br/>1234<br/>1324').lineTo(anchor2);

        new Box().add(311, 1077, 'box-blue', randomName()).lineTo(d1.center);;
        new Box().add(459, 1077, 'box-blue', randomName()).lineTo(d2.center);;
        new Box().add(581, 1077, 'box-blue', randomName()).lineTo(d3.center);;
        new Box().add(709, 1077, 'box-blue', randomName()).lineTo(d4.center);;
        new Box().add(853, 1077, 'box-blue', randomName()).lineTo(d5.center);;
        new Box().add(995, 1077, 'box-blue', randomName()).lineTo(d6.center);;

        new Box().add(1177, 1025, 'box-blue', 'LEARNING<br/>PROGRAMME: SETA<br/>1234<br/>1324').lineTo(anchor2);
        new Box().add(1479, 1025, 'box-blue', randomName()).lineTo(anchor2);

        let pas = new Box().add(1177, 1269, 'box-blue', 'PRODUCTION<br/>ASSISTANCE<br/>');
        let rec = new Box().add(1407, 1269, 'box-blue', 'RECEPTIONIST: <br/>XYZ<br/><br/>');
        addLine(pas.cx, pas.cy, pas.x1 - 40, pas.cy);
        addLine(pas.x1 - 40, pas.cy, pas.x1 - 40, b2.y1 + b2.h + 100);
        addLine(pas.x1 - 40, b2.y1 + b2.h + 100, b2.cx, b2.y1 + b2.h + 100);
        addLine(rec.x1 + 20, rec.cy, rec.x1 + 20, anchor2.y);

    </script>

</body>

</html>
