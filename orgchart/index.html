<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html {
            font-size: 20px;
        }

        body {
            font-family: Calibri, 'Gill Sans', 'Gill Sans MT', 'Trebuchet MS', sans-serif;
        }

        .box {
            position: absolute;
            border: 0.1rem solid black;
            border-radius: 0.25rem;
            padding: 0.5rem 1rem;
            font-weight: bold;
            text-align: center;
        }

        .box-brown {
            background-color: rgb(196, 189, 155);
        }

        .box-light-brown {
            background-color: rgb(220, 217, 197);
        }

        .box-blue {
            background-color: rgb(223, 237, 242);
        }

        .box-purple {
            background-color: rgb(202, 194, 215);
        }

        .table {
            position: absolute;
            left: 2.85rem;
            top: 8.15rem;
            font-weight: bold;
            border-collapse: collapse;
        }

        .table td {
            padding: 0.5rem;
            border: 0.15rem solid black;
        }

        .center {
            text-align: center;
        }

        .table-header {
            background-color: rgb(217, 217, 217);
        }

        .header {
            position: absolute;
            left: 2.85rem;
            top: 1.65rem;
            font-size: 2rem;
            font-weight: bold;
            padding-bottom: 0.7rem;
            border-bottom: 0.1rem solid black;
            width: 100rem;
        }
    </style>
</head>

<body>
    <div class="header">
        HUMAN RESOURCES
    </div>
    <table class="table">
        <tr class="table-header">
            <td colspan="2">
                <div class="center">AUTHORISED BY:</div>
            </td>
        </tr>
        <tr>
            <td>NAME & SURNAME:</td>
            <td>LUNGI MAETA</td>
        </tr>
        <tr>
            <td>DESIGNATION:</td>
            <td>CHIEF HUMAN RESOURCE OFFICER</td>
        </tr>
        <tr>
            <td>SIGNATURE:</td>
            <td></td>
        </tr>
        <tr>
            <td>DATE:</td>
            <td></td>
        </tr>
    </table>
    <svg width="2000" height="2000">
    </svg>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script>
        let scale = 0.66;

        // define x-y grid
        let gx = [17, 174, 177, 311, 437, 459, 581, 630, 709, 800, 853, 873, 995, 1177, 1335, 1407, 1479, 1673, 1767];
        let gy = [158, 259, 419, 553, 685, 895, 1025, 1077, 1269];
        let o2 = Math.floor(2 * scale);
        let o20 = Math.floor(20 * scale);
        let o30 = Math.floor(30 * scale);
        let o40 = Math.floor(50 * scale);
        let o50 = Math.floor(50 * scale);
        let o100 = Math.floor(50 * scale);
        gx = gx.map(x => x * scale);
        gy = gy.map(y => y * scale);
        $('html').css('font-size', `${Math.floor(20 * scale)}px`);

        function addLine(x1, y1, x2, y2, attr2) {
            if (x1 === x2 || y1 === y2) {
                $(document.createElementNS('http://www.w3.org/2000/svg', 'line')).attr({
                    ...attr2,
                    x1, y1, x2, y2,
                    'stroke': 'black',
                    'stroke-width': o2
                }).appendTo('svg');
                return this;
            }
            $(document.createElementNS('http://www.w3.org/2000/svg', 'line')).attr({
                'x1': x1, 'y1': y1, 'x2': x1, 'y2': y2,
                'stroke': 'black',
                'stroke-width': o2
            }).appendTo('svg');
            $(document.createElementNS('http://www.w3.org/2000/svg', 'line')).attr({
                'x1': x1, 'y1': y2, 'x2': x2, 'y2': y2,
                'stroke': 'black',
                'stroke-width': o2
            }).appendTo('svg');
            return this;
        }

        function Box() {
            let x1, y1, w, cx, cy, center;

            function add(x, y, type, html) {
                this.x1 = x;
                this.y1 = y;
                const box = $(`<div class="box ${type}" style="top:${y}px;left:${x}px;">${html}</div>`);
                $('body').append(box);
                this.w = box.outerWidth();
                this.h = box.outerHeight();
                this.cx = this.x1 + Math.floor(this.w / 2);
                this.cy = this.y1 + Math.floor(this.h / 2);
                this.center = { x: this.cx, y: this.cy };
                return this;
            }
            function lineTo(anchor) {
                const x2 = anchor.x;
                const y2 = anchor.y;
                const x1 = this.cx;
                const y1 = this.y1;
                addLine(x1, y1, x2, y2);
                return this;
            }
            return {
                add,
                lineTo
            };
        }


        function randomName() {
            const count = Math.floor(Math.random() * 3) + 3;
            const rnd = [];
            for (let i = 0; i < count; i++) {
                let name = Math.random().toString(36).substring(4, 8).toUpperCase();
                rnd.push(name);
            }
            const list = rnd.reduce((p, c) => `${p}<br/>${c}`);
            return list;
        }
        
        let chief = new Box().add(gx[9], gy[0], 'box-brown', 'CHIEF HUMAN RESOURCE OFFICER<br/>LUNGI MAETA');
        let assist = new Box().add(gx[16], gy[1], 'box-purple', 'PERSONAL ASSISTANT<br/>ALETTA WYNGAARDT');
        let b1 = new Box().add(gx[1], gy[2], 'box-light-brown', 'GENERAL MANAGER(INTERNAL<br/>TRAINING):<br/>RENEY CHETTY');
        let b2 = new Box().add(gx[14], gy[2], 'box-light-brown', 'GENERAL MANAGER(EXTERNAL<br/>TRAINING):<br/>DUDUZILE SCHALK');
        addLine(b1.cx, b1.y1 + o20, b2.cx, b1.y1 + o20);
        addLine(chief.cx, chief.cy, chief.cx, b1.y1 + o20);
        addLine(assist.cx, assist.cy, chief.cx, assist.cy, { 'stroke-dasharray': '4 2' });


        let man1 = new Box().add(gx[7], gy[3], 'box-blue', 'ADMIN MANAGER<br/>CANDICE PORTER<br/>').lineTo(b1.center);
        new Box().add(gx[18], gy[3], 'box-blue', 'ACCOUNTANT<br/>SIBONGILE<br/>');

        let t1 = new Box().add(gx[4], gy[4], 'box-blue', 'TRAINING ADMIN<br/>ASSISTANT<br/>CHANTEL SIMPSON');
        let t2 = new Box().add(gx[11], gy[4], 'box-blue', 'LEARNING<br/>PROGRAMME<br/>CO-ORDINATOR<br/>VACANT');
        addLine(t1.cx, t1.y1 + o50, t2.cx, t1.y1 + o50);
        addLine(man1.cx, man1.cy, man1.cx, t1.y1 + o50);

        new Box().add(gx[18], gy[4], 'box-blue', 'ADMINISTRATIVE<br/>ASSISTANT<br/>JOY MALINGA').lineTo(b2.center);

        const anchor = { x: b1.cx, y: (gy[5] - o40) };
        new Box().add(gx[0], gy[5], 'box-blue', 'NATIONAL<br/>SYSTEMS<br/>SPECIALIST<br/>FRANS<br/>MOTHUTSE').lineTo(anchor);
        new Box().add(gx[2], gy[5], 'box-blue', 'SKILLS<br/>DEV<br/>FACILITA<br/>TOR<br/>MELBA<br/>JACOBS').lineTo(anchor);
        let d1 = new Box().add(gx[3], gy[5], 'box-blue', 'FACILITA<br/>TORS<br/>HAZEL<br/>MOTSISI').lineTo(anchor);
        let d2 = new Box().add(gx[5], gy[5], 'box-blue', 'FACILIT<br/>ACTORS<br/>PAULOS<br/>BEJE').lineTo(anchor);
        let d3 = new Box().add(gx[6], gy[5], 'box-blue', 'TDM<br/>NORTHE<br/>RN<br/>RAJ<br/>GOVIND').lineTo(anchor);
        let d4 = new Box().add(gx[8], gy[5], 'box-blue', 'TDM<br/>KZN<br/>MPUME<br/>MYEZA').lineTo(anchor);
        let d5 = new Box().add(gx[10], gy[5], 'box-blue', 'TDM<br/>W&E<br/>CAPE<br/>VACANT').lineTo(anchor);
        let d6 = new Box().add(gx[12], gy[5], 'box-blue', 'TDM<br/>HEALTHC<br/>ARE<br/>PHUME<br/>GUMEDE').lineTo(anchor);
        addLine(anchor.x, anchor.y, b1.cx, b1.cy)

        const anchor2 = { x: b2.cx, y: (gy[5] - o40) };
        addLine(b2.cx, b2.cy, b2.cx, anchor2.y);
        new Box().add(gx[13], gy[5], 'box-blue', 'MANAGER: SETA<br/>PROJECTS<br/>CLEMENT<br/>TSHIKOLOMO');
        new Box().add(gx[16], gy[5], 'box-blue', 'MANAGER: EXTERNAL<br/>PROJECTS<br/>ANTHENA BASSON');
        new Box().add(gx[18], gy[5], 'box-blue', 'MANAGER: EXTERNAL<br/>PROJECTS<br/>TANYA ANTHONY').lineTo(anchor2);

        new Box().add(gx[3], gy[7], 'box-blue', 'TC X 7').lineTo(d1.center);;
        new Box().add(gx[5], gy[7], 'box-blue', 'TC X 4').lineTo(d2.center);;
        new Box().add(gx[6], gy[7], 'box-blue', 'TC X 6').lineTo(d3.center);;
        new Box().add(gx[8], gy[7], 'box-blue', 'TC X 4').lineTo(d4.center);;
        new Box().add(gx[10], gy[7], 'box-blue', 'TC X 6').lineTo(d5.center);;
        new Box().add(gx[12], gy[7], 'box-blue', 'TC X 1<br/>VACANT X 2').lineTo(d6.center);;

        new Box().add(gx[13], gy[6], 'box-blue', 'LEARNING<br/>PROGRAMME CO-<br/>ORDINAORS:<br/>THEMBI THEKISO<br/>SILAE MUFUMADI<br/>PORTIA NETSHIFHEFHE<br/>TUMELO MARAOKA').lineTo(anchor2);
        new Box().add(gx[16], gy[6], 'box-blue', 'LEARNING<br/>PROGRAMME CO-<br/>CORDINATOR:<br/>MAMODISE MAAKE').lineTo(anchor2);

        let pas = new Box().add(gx[13], gy[8], 'box-blue', 'PRODUCTION<br/>ASSISTANT:<br/>VACANT');
        let rec = new Box().add(gx[15], gy[8], 'box-blue', 'RECEPTIONIST: <br/>SHIRLEY<br/>MASHASHANE');
        addLine(pas.cx, pas.cy, pas.x1 - o30, pas.cy);
        addLine(pas.x1 - o30, pas.cy, pas.x1 - o30, b2.y1 + b2.h + o100);
        addLine(pas.x1 - o30, b2.y1 + b2.h + o100, b2.cx, b2.y1 + b2.h + o100);
        addLine(rec.x1 + o20, rec.cy, rec.x1 + o20, anchor2.y);
    </script>

</body>

</html>
