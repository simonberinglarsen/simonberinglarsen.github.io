<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0px;
            margin: 0px;
        }

        body {
            background-color: #888;
        }

        .card {
            background-color: #eee;
            border-radius: 5px;
            box-shadow: 0px 3px 15px rgba(0, 0, 0, 0.5);
        }

        .card-result {
            color: #aaa;
            background-color: #444;
        }

        .m-2 {
            margin: 20px;
        }

        .mb-1 {
            margin-bottom: 10px;
        }

        .p-2 {
            padding: 20px;
        }

        button {
            background-color: #0a0;
            font-weight: bold;
            box-shadow: 0px 3px 15px rgba(0, 0, 0, 0.5);
        }

        button:active {
            position: relative;
            top: 2px;
            box-shadow: none;
        }

        button:hover {
            background-color: #8f8;
        }

        button,
        input {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid black;
        }

        .row {
            display: flex;
            flex-direction: row;
        }

        .column {
            display: flex;
            flex-direction: column;
        }
    </style>
</head>

<body>
    <div class="row">
        <div class="column">
            <div class="card p-2 m-2">
                <h1 class="mb-1">Simulation runs</h1>
                <button id="btn-run">RUN</button>
                <input id="input-runs" type="number" value="1001">
            </div>
            <div class="card p-2 m-2">
                <h1 class="mb-1">Simulation window (hour)</h1>
                <input id="input-simulationStart" type="number" value="11">
                <input id="input-simulationEnd" type="number" value="18">
            </div>
            <div class="card p-2 m-2">
                <h1 class="mb-1">Cone making (m + dev.)</h1>
                <input id="input-coneDuration" type="number" value="7">
                <input id="input-coneDeviation" type="number" value="1">
            </div>
            <div class="card p-2 m-2">
                <h1 class="mb-1">New customer (m)</h1>
                <input id="input-customerDuration" type="number" value="7">
            </div>
        </div>
        <div class="column">
            <div class="card card-result p-2 m-2">
                <h1 class="mb-1">Result</h1>
                <pre id="results">...click run...</pre>
            </div>

        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jstat/1.9.4/jstat.min.js"
        integrity="sha512-MGT8BGoc8L3124PwHEGTC+M8Hu9oIbZOg8ENcd92sQKKidWKOOOZ6bqQemqYAX0yXJUnovOkF4Hx9gc/5lVxPw=="
        crossorigin="anonymous"></script>
    <script type="module">
        import { App } from './app.js';
        let app = new App();
        app.run();
    </script>
</body>

</html>
