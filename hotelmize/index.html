<!doctype html>

<html lang="en">

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="debug-button"><a href="index2.html">reservations page 🡆</a></div>
    <div class="side-bar">
        <div class="section mx-1 mt-4 font-size-large">
            <div class="profile-pic"><img class="clip" src="profile.jpg"></div>
            <div>
                Roy Tagliaferro
            </div>
        </div>
        <div class="section seperator"></div>
        <div class="section mx-1">
            <div class="link selected mb-1"> Dashboard </div>
            <div class="link"> Reservations </div>
        </div>
        <div class="section seperator"></div>
        <div class="section mx-1">
            <div class="button selected font-size-small"><i class="far fa-circle item-icon"></i>Total</div>
            <div class="button font-size-small"><i class="far fa-file-alt item-icon"></i></i>Accepted </div>
            <div class="button font-size-small"><i class="fas fa-check item-icon"></i>OK </div>
            <div class="button font-size-small"><i class="fas fa-flag-checkered item-icon"></i>Fulfilled </div>
            <div class="button font-size-small"><i class="fas fa-ban item-icon"></i>Cancelled </div>
            <div class="button font-size-small"><i class="fas fa-exclamation item-icon"></i>Error </div>
            <div class="button font-size-small"><i class="fas fa-hand-holding-usd item-icon"></i>Future Profit </div>
        </div>
    </div>
    <div class="content">
        <div class="mx-3 mt-4">
            <div class="header mb-2">
                <div>
                    <span class="font-size-title font-weight-bold mr-1">Total</span>2114
                </div>
                <div class="sub-header">
                    Sum of all bookings we created
                </div>
            </div>
            <div class="mb-2">
                <div class="d-flex flex-row">
                    <div class="mr-2">
                        <div class="box mb-1 px-1 d-flex align-items-center h-100">
                            <div>Dates</div>
                            <div class="ml-auto"><i class="far fa-calendar-alt"></i></div>
                        </div>
                        <div class="d-flex flex-row ">
                            <div class="box dark mb-1 mr-1 px-1 d-flex justify-content-center align-items-center h-100">
                                Checkin</div>
                            <div
                                class="box border-dark mb-1 px-1 d-flex justify-content-center align-items-center h-100">
                                Rebooking</div>
                        </div>
                        <div class="box light mb-1 d-flex justify-content-center align-items-center h-100">Apply</div>
                    </div>
                    <div class="card normal mr-2 mb-1 p-1 d-flex flex-column">
                        <div>$ Old price</div>
                        <div class="h-100">
                            <div class="d-flex justify-content-center align-items-center h-100">
                                <div class="font-size-huge">+1.56M</div>
                            </div>
                        </div>
                    </div>
                    <div class="card dark mr-2 mb-1 p-1 d-flex flex-column">
                        <div>$ New price</div>
                        <div class="h-100">
                            <div class="d-flex justify-content-center align-items-center h-100">
                                <div class="font-size-huge">+1.40M</div>
                            </div>
                        </div>
                    </div>
                    <div class="card light fill mb-1 p-1 d-flex flex-column">
                        <div><span class="font-size-large">$ Profit</span></div>
                        <div class="d-flex justify-content-center align-items-center h-100">
                            <div class="font-size-super-huge">+158k</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="graph mb-2">
                <div class="d-flex justify-content-center align-items-center h-100">
                    <img src="graph.png">
                </div>
            </div>
        </div>
    </div>
</body>

</html>
