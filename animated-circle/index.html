<!DOCTYPE html>
<html>

<head>
  <meta charset=UTF-8 />
  <style>
    body {
      background-color: #222;
    }

    .container {
      display: block;
      width: 360px;
      height: 120px;
      margin-left: auto;
      margin-right: auto;
    }

    .icon {
      position: relative;
      top: -100px;
      left: 275px;
      font-size: 50px;
    }

    .shift {
      transform: translateX(-100px);
    }

    #icons {
      display:flex;
      flex-direction: column;
    }
  </style>
</head>

<body>
  <div id="icons">
    <div class="container">
      <svg id="demo-svg" width="360px" height="120px">
        <g transform='translate(-220 0)'>
          <line class="l1" transform='translate(340 0) scale(0.95, 1)' x1="200" y1="30" x2="200" y2="30" stroke="#f00"
            stroke-width="0" stroke-linecap="round" />
          <line class="l1" transform='translate(340 0) scale(0.55, 1)' x1="200" y1="50" x2="200" y2="50" stroke="#f00"
            stroke-width="0" stroke-linecap="round" />
          <line class="l1" transform='translate(325 0) scale(0.75, 1)' x1="200" y1="70" x2="200" y2="70" stroke="#f00"
            stroke-width="0" stroke-linecap="round" />
          <line class="l1" transform='translate(340 0) scale(0.95, 1)' x1="200" y1="90" x2="200" y2="90" stroke="#f00"
            stroke-width="0" stroke-linecap="round" />
          <line class="l1" transform='translate(350 0) scale(1, 1)' x1="200" y1="30" x2="200" y2="30" stroke="#f00"
            stroke-width="0" stroke-linecap="round" />
          <line class="l1" transform='translate(350 0) scale(1, 1)' x1="200" y1="50" x2="200" y2="50" stroke="#f00"
            stroke-width="0" stroke-linecap="round" />
          <line class="l1" transform='translate(350 0) scale(1, 1)' x1="200" y1="70" x2="200" y2="70" stroke="#f00"
            stroke-width="0" stroke-linecap="round" />
          <line class="l1" transform='translate(350 0) scale(1, 1)' x1="200" y1="90" x2="200" y2="90" stroke="#f00"
            stroke-width="0" stroke-linecap="round" />
          <circle class="c1" cx="530" cy="60" r="45" fill="#f00" />

          <line class="l2" transform='translate(240 0) scale(1.3, 1)' x1="200" y1="30" x2="200" y2="30" stroke="#fa0"
            stroke-width="0" stroke-linecap="round" />
          <line class="l2" transform='translate(220 0) scale(1.1, 1)' x1="200" y1="50" x2="200" y2="50" stroke="#fa0"
            stroke-width="0" stroke-linecap="round" />
          <line class="l2" transform='translate(215 0) scale(1.1, 1)' x1="200" y1="70" x2="200" y2="70" stroke="#fa0"
            stroke-width="0" stroke-linecap="round" />
          <line class="l2" transform='translate(240 0) scale(1.3, 1)' x1="200" y1="90" x2="200" y2="90" stroke="#fa0"
            stroke-width="0" stroke-linecap="round" />
          <line class="l2" transform='translate(350 0) scale(1, 1)' x1="200" y1="30" x2="200" y2="30" stroke="#fa0"
            stroke-width="0" stroke-linecap="round" />
          <line class="l2" transform='translate(350 0) scale(1, 1)' x1="200" y1="50" x2="200" y2="50" stroke="#fa0"
            stroke-width="0" stroke-linecap="round" />
          <line class="l2" transform='translate(350 0) scale(1, 1)' x1="200" y1="70" x2="200" y2="70" stroke="#fa0"
            stroke-width="0" stroke-linecap="round" />
          <line class="l2" transform='translate(350 0) scale(1, 1)' x1="200" y1="90" x2="200" y2="90" stroke="#fa0"
            stroke-width="0" stroke-linecap="round" />
          <circle class="c2" cx="530" cy="60" r="40" fill="#fa0" />

          <line class="l3" transform='translate(430 0) scale(0.5, 1)' x1="200" y1="30" x2="200" y2="30" stroke="#fff"
            stroke-width="0" stroke-linecap="round" />
          <line class="l3" transform='translate(410 0) scale(0.5, 1)' x1="200" y1="50" x2="200" y2="50" stroke="#fff"
            stroke-width="0" stroke-linecap="round" />
          <line class="l3" transform='translate(405 0) scale(0.5, 1)' x1="200" y1="70" x2="200" y2="70" stroke="#fff"
            stroke-width="0" stroke-linecap="round" />
          <line class="l3" transform='translate(430 0) scale(0.5, 1)' x1="200" y1="90" x2="200" y2="90" stroke="#fff"
            stroke-width="0" stroke-linecap="round" />
          <line class="l3" transform='translate(350 0) scale(0.6, 1)' x1="200" y1="30" x2="200" y2="30" stroke="#fff"
            stroke-width="0" stroke-linecap="round" />
          <line class="l3" transform='translate(350 0) scale(0.9, 1)' x1="200" y1="50" x2="200" y2="50" stroke="#fff"
            stroke-width="0" stroke-linecap="round" />
          <line class="l3" transform='translate(350 0) scale(0.8, 1)' x1="200" y1="70" x2="200" y2="70" stroke="#fff"
            stroke-width="0" stroke-linecap="round" />
          <line class="l3" transform='translate(350 0) scale(0.7, 1)' x1="200" y1="90" x2="200" y2="90" stroke="#fff"
            stroke-width="0" stroke-linecap="round" />
          <circle class="c3" cx="530" cy="60" r="30" fill="#fff" />
        </g>
      </svg>
      <div class="icon">🧠</div>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
    integrity="sha256-4+XzXVhsDmqanXGHaHvgh1gMQKX40OUvDEBTu8JcmNs=" crossorigin="anonymous"></script>
  <script src="anime.min.js"></script>
  <script>
    let container =  $('.container');
    container.clone().addClass('shift').appendTo($('#icons'));
    container.clone().appendTo($('#icons'));
    container.clone().addClass('shift').appendTo($('#icons'));
    container.clone().appendTo($('#icons'));
    container.clone().addClass('shift').appendTo($('#icons'));
    container.clone().appendTo($('#icons'));
    const icons = ['🧠','😷','👌','😍','🤗','💩','🥵'];
    $('.icon').each((i,e) => {
      e.innerHTML = icons[i];
    });

    anime({
      targets: '#demo-svg line.l1',
      x1: [200, 150, 50, 30],
      x2: [200, 100, 50, 30],
      'stroke-width': [30, 20, 10, 3],
      easing: 'linear',
      duration: 2000,
      loop: true,
    });
    anime({
      targets: '#demo-svg line.l2',
      x1: [200, 150, 50, 30],
      x2: [180, 100, 50, 30],
      'stroke-width': [20, 15, 5, 2],
      easing: 'linear',
      duration: 2000,
      loop: true,
    });
    anime({
      targets: '#demo-svg line.l3',
      x1: [200, 150, 50, 30],
      x2: [160, 100, 50, 30],
      'stroke-width': [10, 6, 3, 1],
      easing: 'linear',
      duration: 2000,
      loop: true,
    });
    anime({
      targets: '#demo-svg circle.c1',
      cx: [530, 535, 525],
      cy: [60, 60, 60],
      r: [45, 45, 45],
      easing: 'linear',
      duration: 2000,
      direction: 'alternate',
      loop: true,
    });
    anime({
      targets: '#demo-svg circle.c2',
      cx: [530, 525, 535],
      cy: [60, 60, 60],
      r: [40, 40, 40],
      easing: 'linear',
      duration: 2000,
      direction: 'alternate',
      loop: true,
    });
    anime({
      targets: '#demo-svg circle.c3',
      cx: [525, 530, 535],
      cy: [60, 60, 60],
      r: [30, 40, 30],
      easing: 'linear',
      duration: 2000,
      direction: 'alternate',
      loop: true,
    });
    anime({
      targets: '.icon',
      translateX: [5, 0],
      easing: 'easeInOutSine',
      duration: 500,
      direction: 'alternate',
      loop: true,
    });
  </script>
</body>

</html>
