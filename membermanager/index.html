<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="styles.css">
    <title>Member Manager</title>
</head>

<body>
    <div id="loginScreen">
        <div>
            <div>
                <h1>Sign In</h1>
                <div>Username: </div>
                <input id="loginUser" type="text" id="username" name="username">
                <div>Password: </div>
                <input id="loginPassword" type="text" id="password" name="password">
                <div>
                    <button id="btnLogin">Login</button>
                </div>
                <div id="loginValidation" class="error">
                    wrong user or password
                </div>
            </div>
        </div>
    </div>

    <div id="memberAdminScreen">
        <div>
            <h1>
                Member administration
            </h1>
            <div>
                <button id="btnLogout">Logout</button>
            </div>
        </div>
        <table id="userTable">
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Name</th>
                    <th>Date of Birth</th>
                    <th>Address</th>
                    <th>Mobile</th>
                    <th>Age</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="main.js"></script>
</body>

</html>
