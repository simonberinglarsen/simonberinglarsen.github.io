<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="styles.css">
    <title>Member Manager</title>
</head>

<body>
    <div id="loginScreen">
        <h1>Sign In</h1>
        <div>Username: </div>
        <input id="loginUser" type="text" name="username">
        <div>Password: </div>
        <input id="loginPassword" type="text" name="password">
        <div>
            <button id="btnLogin">Login</button>
        </div>
        <div id="loginValidation" class="error">
            wrong user or password
        </div>
    </div>

    <div id="memberAdminScreen">
        <h1>
            Member administration
        </h1>
        <button id="btnLogout">Logout</button>
        <br />
        <br />
        <hr/>
        <br />

        <table id="userForm">
            <tr>
                <td>id</td>
                <td><input id="memId" type="text"></td>
            </tr>
            <tr>
                <td>name</td>
                <td><input id="memName" type="text"></td>
            </tr>
            <tr>
                <td>dob</td>
                <td><input id="memDob" type="text"></td>
            </tr>
            <tr>
                <td>address</td>
                <td><input id="memAddress" type="text"></td>
            </tr>
            <tr>
                <td>mobile</td>
                <td><input id="memMobile" type="text"></td>
            </tr>
            <tr>
                <td>age</td>
                <td><input id="memAge" type="text"></td>
            </tr>
        </table>
        <br />
        <button id="btnAdd">Add</button>
        <button id="btnClear">Clear</button>
        <br />
        <br />
        <hr/>
        <br />
        <button id="btnRefresh">Refresh memberlist</button>
        <br />
        <br />
        <table id="userTable">
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Name</th>
                    <th>Date of Birth</th>
                    <th>Address</th>
                    <th>Mobile</th>
                    <th>Age</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="main.js"></script>
</body>

</html>
