<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: rgb(171, 72, 162);
            background: linear-gradient(180deg, rgba(171, 72, 162, 1) 0%, rgba(111, 73, 234, 1) 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .center {
            text-align: center;
        }


        .text-yellow {
            color: rgb(255, 185, 0);
        }

        .text-white {
            color: white;
        }

        .font-size-1 {
            font-size: 18px;
        }

        .font-size-2 {
            font-size: 20px;
        }

        .font-size-3 {
            font-size: 30px;
        }

        .text-huge {
            font-size: 200px;
        }

        .text-bold {
            font-weight: bold;
            ;
        }

        .aboslute {
            position: absolute;
        }


        .btn {
            position: relative;
            top: -30px;
            border-radius: 40px;
            background: rgb(15, 11, 9);
            background: linear-gradient(90deg, rgba(250, 116, 78, 1) 0%, rgba(241, 80, 150, 1) 100%);
            padding: 15px 30px;
            cursor: pointer;
        }

        .m-1 {
            margin: 8px;
        }

        .m-2 {
            margin: 16px;
        }

        .mt-3 {
            margin-top: 32px;
        }

        .p-2 {
            padding: 20px;
        }

        .bg-white {
            background: white;
        }

        .h-100 {
            height: 100%;
        }

        .text-purple {
            color: rgb(87, 65, 165);
        }

        .border-left {
            border-left: 1px solid rgb(150,150,150);
        }

        .row {
            display:flex;
            flex-direction: row;
            justify-content: center;
        }
    </style>
</head>

<body>
    <canvas class="aboslute" id="world"></canvas>
    <div>
        <div class="center text-huge">🏆</div>
        <div class="center font-size-1 text-white m-1">Congratulations on winning</div>
        <div class="center font-size-3 text-bold text-white">You have earned</div>
        <div class="center font-size-3 text-bold text-yellow">Rs.6,000.00</div>
        <div class="center font-size-1 text-white mt-3">50 people share 10,000INR</div>
    </div>
    <div class="bg-white h-100">
        <div class="row">
            <div class="btn font-size-2 text-white">Share and get extra lifelines</div>
        </div>
        <div class="center font-size-1 text-purple text-bold">NEXT GAME</div>
        <div class="row m-1">
            <div class="p-2">
                <div class="center text-bold">Today</div>
                <div class="center text-bold text-yellow">3.00PM - 9.00PM</div>
            </div>
            <div class="border-left p-2">
                <div class="center text-bold">Prize Amount</div>
                <div class="center text-bold text-yellow">INR 10,000</div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var COLORS, Confetti, NUM_CONFETTI, PI_2, canvas, confetti, context, drawCircle, i, range, resizeWindow, xpos;

            NUM_CONFETTI = 350;

            COLORS = [[85, 71, 106], [174, 61, 99], [219, 56, 83], [244, 92, 68], [248, 182, 70]];

            PI_2 = 2 * Math.PI;

            canvas = document.getElementById("world");

            context = canvas.getContext("2d");

            window.w = 0;

            window.h = 0;

            resizeWindow = function () {
                window.w = canvas.width = window.innerWidth;
                return window.h = canvas.height = window.innerHeight;
            };

            window.addEventListener('resize', resizeWindow, false);

            window.onload = function () {
                return setTimeout(resizeWindow, 0);
            };

            range = function (a, b) {
                return (b - a) * Math.random() + a;
            };

            drawCircle = function (x, y, r, style) {
                context.beginPath();
                context.arc(x, y, r, 0, PI_2, false);
                context.fillStyle = style;
                return context.fill();
            };

            xpos = 0.5;

            document.onmousemove = function (e) {
                return xpos = e.pageX / w;
            };

            window.requestAnimationFrame = function () {
                return window.requestAnimationFrame || window.webkitRequestAnimationFrame || window.mozRequestAnimationFrame || window.oRequestAnimationFrame || window.msRequestAnimationFrame || function (callback) {
                    return window.setTimeout(callback, 1000 / 60);
                };
            }();

            Confetti = class Confetti {
                constructor() {
                    this.style = COLORS[~~range(0, 5)];
                    this.rgb = `rgba(${this.style[0]},${this.style[1]},${this.style[2]}`;
                    this.r = ~~range(2, 6);
                    this.r2 = 2 * this.r;
                    this.replace();
                }

                replace() {
                    this.opacity = 0;
                    this.dop = 0.03 * range(1, 4);
                    this.x = range(-this.r2, w - this.r2);
                    this.y = range(-20, h - this.r2);
                    this.xmax = w - this.r;
                    this.ymax = h - this.r;
                    this.vx = range(0, 2) + 8 * xpos - 5;
                    return this.vy = 0.7 * this.r + range(-1, 1);
                }

                draw() {
                    var ref;
                    this.x += this.vx;
                    this.y += this.vy;
                    this.opacity += this.dop;
                    if (this.opacity > 1) {
                        this.opacity = 1;
                        this.dop *= -1;
                    }
                    if (this.opacity < 0 || this.y > this.ymax) {
                        this.replace();
                    }
                    if (!(0 < (ref = this.x) && ref < this.xmax)) {
                        this.x = (this.x + this.xmax) % this.xmax;
                    }
                    return drawCircle(~~this.x, ~~this.y, this.r, `${this.rgb},${this.opacity})`);
                }
            };



            confetti = function () {
                var j, ref, results;
                results = [];
                for (i = j = 1, ref = NUM_CONFETTI; 1 <= ref ? j <= ref : j >= ref; i = 1 <= ref ? ++j : --j) {
                    results.push(new Confetti());
                }
                return results;
            }();

            window.step = function () {
                var c, j, len, results;
                requestAnimationFrame(step);
                context.clearRect(0, 0, w, h);
                results = [];
                for (j = 0, len = confetti.length; j < len; j++) {
                    c = confetti[j];
                    results.push(c.draw());
                }
                return results;
            };

            step();

        }).call(this);


//# sourceURL=coffeescript
    </script>
</body>

</html>
