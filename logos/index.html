<html>

<head>
    <link rel="stylesheet" href="dist/reveal.css">
    <link rel="stylesheet" href="dist/theme/black.css">
    <link rel="stylesheet" href="assets/css/all.min.css">
    <style>
        .container {
            position: relative;
            width: 500px;
        }

        .imageOne {
            padding-top: 50px;
            width: 100%;
        }

        .imageTwo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .mx-auto {
            margin-left: auto;
            margin-right: auto;
        }

        .flex-row {
            display: flex;
            flex-direction: row;
            ;
        }

        .rounded {
            border-radius: 3px;
            border: 1px solid #aaa;
            box-shadow: 0px 10px 15px rgba(0, 0, 0, 0.8);
        }

        .p-1 {
            padding: 10px;
        }

        .border-bottom {
            border-bottom: 1px solid #aaa;
        }

        .font-size-medium {
            font-size: 1.5rem;
        }

        .font-size-small {
            font-size: 0.75rem;
        }

        .text-gray {
            color: #aaa;
        }

        .text-gray-2 {
            color: #222;
        }

        .options {
            max-width: 300px;
            background-color: #555;
        }

        .clickable {
            cursor: pointer;
        }

        .description {
            color: #888;
        }

        .company-name {
            color: white;
        }

        .mb-1 {
            margin-bottom: 10px;
        }

        .mr-auto {
            margin-right: auto;
        }

        .flex-row {
            display: flex;
            flex-direction: row;
        }

        .w-fixed-1 {
            width: 50px;
        }

        .badge{
            font-size: 0.75rem;
            border-radius: 5px;
            padding: 5px;
            background-color: #222;
            color:#aaa;
            font-weight: bold;
            box-shadow: 0px 10px 15px rgba(0, 0, 0, 0.8);
            border: 2px solid #555;
        }
    </style>
</head>

<body>
    <div class="reveal">
        <div class="slides">
            <section id="slide-deck">
                <section id="main" class="clickable">
                    <div>
                        <img class="rounded" src="images/profile200.jpg" width="100">
                    </div>
                    <div class="mx-auto">Simon</div>
                    <div class="mx-auto font-size-small text-gray mb-1">on freelancer.com</div>
                    <div class="options  text-gray rounded mx-auto font-size-medium">
                        <div class="flex-row p-1">
                            <div class="w-fixed-1 text-gray-2"><i class="fas fa-mouse"></i></div>
                            <div class="text-gray">Click to continue</div>
                        </div>
                        <div class="flex-row p-1">
                            <div class="w-fixed-1 text-gray-2"><i class="far fa-keyboard"></i></div>
                            <div class="text-gray">Use arrow keys</div>
                        </div>
                        <div class="flex-row p-1 text-gray-2">
                            <div class="w-fixed-1"><i class="fas fa-mouse"></i></div>
                            <div class="text-gray">Use scroll wheel</div>
                        </div>
                        <div class="flex-row p-1 text-gray-2">
                            <div class="w-fixed-1"><span class="badge">ESC</span> </div>
                            <div class="text-gray">View all slides</div>
                        </div>
                    </div>
                </section>
                <section id="slide-template">
                    <div class="container mx-auto">
                        <img class="imageOne" src="images/frame%frame-index%.svg" width="500">
                        <img class="imageTwo" src="logos/%img-src%" width="250">
                    </div>
                    <div class="description">
                        <div class="company-name">%company-name%</div>
                        <div class="company-description">%company-description%</div>
                    </div>
                </section>
            </section>
        </div>
    </div>
    <script src="dist/reveal.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script>
        Reveal.initialize({
            controls: true,
            loop: false,
            mouseWheel: true,
            center: true,
            theme: 'default', // default/neon
            transition: 'default' // default/cube/page/concave/linear(2d)        
        });
        $('#main').click(() => {
            Reveal.next();
        });

        const logos = [
            { name: 'Retrogusto', img: 'retro4.svg', description: 'Itialian family restaurant' },
            { name: `John's Bakery`, img: 'johnsbakery.svg', description: 'Bakery. Offsetting colors for extra retro look.' },
            { name: 'Buttonly', img: 'Buttonly.svg', description: 'Shop buttons online - webshop.' },
            { name: 'Bullisher', img: 'Bullisher.svg', description: 'Freelancer doing scripting on linux' },
            { name: `Owl Creek Soccer`, img: 'soccer.svg', description: 'Old boys team with custom logo.' },
            { name: 'Self Promotion', img: 'retro1.svg', description: 'Showcasing retro style' },
            { name: 'Eternity Ready Plus', img: 'eternity.svg', description: 'Podcast platform - hosting podcasts' },
            { name: 'Self Promotion', img: 'retro2.svg', description: 'Showcasing retro style' },
            { name: 'Jyoti Beauty Parlour', img: 'jyoti.svg', description: 'Beauty Parlour. Hair. Manicure. Pedicure. Facial.' },
            { name: 'Self Promotion', img: 'retro3.svg', description: 'Showcasing retro style' },
            { name: 'Cashift', img: 'cashift.svg', description: 'Buy & sell online.' },
            { name: '4seven', img: '4seven.svg', description: 'Webshop with Gadgets' },
            { name: 'Bgirl', img: 'Bgirl.svg', description: 'T-shirts for girls' },
            { name: 'HorseM', img: 'HorseM.svg', description: 'Excellent instruction in riding and horse management' },
            { name: 'BeautyA', img: 'BeautyA.svg', description: 'Beauty. Manicure. Pedicure.' },
            { name: 'Savewell', img: 'savewell1.svg', description: 'Financial freedom. Wealth.' },
        ];
        const slideDeck = $('#slide-deck');
        const slideTemplate = $('#slide-template');
        const html = slideTemplate.html();
        slideTemplate.remove();
        logos.forEach((logo, i) => {
            const newHtml = html
                .split('%company-name%').join(logo.name)
                .split('%img-src%').join(logo.img)
                .split('%company-description%').join(logo.description)
                .split('%frame-index%').join(`${i % 4}`);
            const newSlide = $(`<section>${newHtml}</section>`);
            slideDeck.append(newSlide);
        });


    </script>
</body>

</html>
