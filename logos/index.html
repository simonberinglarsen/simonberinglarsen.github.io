<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo design by Simon</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 20px;
            color: #444;
            background-color: #aaa;
        }

        .d-none {
            display: none;
        }

        .bg-white {
            background-color: white;
        }

        .bg-1 {
            background-color: #2a9d8f;
        }

        .bg-2 {
            background-color: #e9c46a;
        }

        .bg-3 {
            background-color: #e76f51;
        }


        .center {
            margin-left: auto;
            margin-right: auto;
        }

        .logo-box {
            width: 300px;
            height: 300px;
            box-shadow: 0px 3px 15px rgba(0, 0, 0, 0.2);
            outline: 1px solid #444;
        }

        .logo-mini-box {
            outline: 1px solid #444;
            width: 100px;
            height: 100px;
            margin: 0px;
            padding: 0px;
        }

        .logo-description {
            width: 500px;
        }

        .highlight {
            padding: 4px 8px;
            background: #444;
            color: #aaa;
        }

        .p-1 {
            padding: 20px;
        }

        .mb-1 {
            margin-bottom: 10px;
        }

        .mb-2 {
            margin-bottom: 40px;
        }

        .border-line {
            margin: 40px 0px;
            border-bottom: 4px solid #888;
        }

        .header {
            background: #888;
            margin-bottom: 20px;
            height: 4px;
        }

        .row {
            display: flex;
            flex-direction: row;
            justify-content: center;
        }

        img {
            display: block;
            margin: 0px;
            padding: 0px;
            width: 100%;
            height: auto;
        }
    </style>
</head>

<body>
    <div class="template d-none">
        <div class="row">
            <div class="logo-box bg-white">
                <img src="logos/jyoti.svg">
            </div>
            <div class="logo-mini-box">
                <img class="logo-mini-box bg-1" src="logos/jyoti.svg">
                <img class="logo-mini-box bg-2" src="logos/jyoti.svg">
                <img class="logo-mini-box bg-3" src="logos/jyoti.svg">
            </div>
        </div>
        <div class="center logo-description p-1 mb-2">
            <div class="mb-1"><span class="highlight">Company:</span> %companyname%</div>
            <div class="mb-1"><span class="highlight">Designer:</span> simon larsen</div>
            <div class="mb-1"><span class="highlight">Format:</span> vector</div>
        </div>
        <div class="border-line"></div>
    </div>
    <header>
        <div class="header"></div>
    </header>
    <main></main>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script>
        const logos = [
            { name: 'Jyoti Beauty Parlour', img: 'jyoti.svg' },
            { name: 'Savewell', img: 'savewell1.svg' },
            { name: '4seven', img: '4seven.svg' },
            { name: 'BeautyA', img: 'BeautyA.svg' },
            { name: 'Bgirl', img: 'Bgirl.svg' },
            { name: 'Bleaf', img: 'Bleaf.svg' },
            { name: 'Bullisher', img: 'Bullisher.svg' },
            { name: 'HorseM', img: 'HorseM.svg' },
            { name: 'Buttonly', img: 'Buttonly.svg' },
            { name: 'Cashift', img: 'cashift.svg' },
            { name: 'Savewell', img: 'savewell2.svg' }
        ];
        logos.forEach(l => {
            const templateHtml = $('.template').html().split('jyoti.svg').join(l.img).split('%companyname%').join(l.name);
            const templateInstance = $(templateHtml);
            templateInstance.removeClass('d-none');
            $('main').append(templateInstance);
        });

    </script>
</body>

</html>
