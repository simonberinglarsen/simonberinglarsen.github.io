<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            background-color: #666;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif
        }

        .greeting {
            text-align: center;
            margin: 40px;
            padding: 20px;
            border-radius: 5px;
            background-color: #aaa;
            border: 1px solid #ccc;
        }

        .shadow {
            box-shadow: 0px 3px 15px rgba(0, 0, 0, 0.6);
        }

        .row {
            display: flex;
            flex-direction: row;
            justify-content: center;
        }

        .text-big {

            font-size: 1.25rem;
            font-weight: bolder;

        }

        .country {
            color: #600;
        }

        .city {
            font-weight: bolder;
            color: #060;
        }

        .zip {
            font-weight: bolder;
            color: #006;
        }
    </style>
</head>

<body>
    <div class="row">
        <div class="greeting shadow">

        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script>
        async function getInfo() {
            const response = await fetch('http://ip-api.com/json');
            let res = await response.json();
            console.log(res);
            $('.greeting').html(`
            <div>Hi! I see that you are from <span class="country text-big">${res.country}</span></div>
            <div>and live in <span class="city text-big">${res.city}</span> </div>
            <div>with zipcode <span class="zip text-big">${res.zip}</span></div> `);
        }
        getInfo();
    </script>
</body>

</html>
