<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Russo One">
    <title>Scrolling Text</title>
    <style>
        * {
            padding: 0px;
            margin: 0px;
        }

        body {
            background-color: #ccc;
            font-family: 'Russo One', serif;
        }

        .info {
            display: flex;
            justify-content: center;
            margin-top: 200px;
            font-size: 30px;
            color: #888;
        }

        .leftObserver {
            width: calc(50% - 250px);
        }

        .centerObserver {
            box-shadow: 0px 3px 15px rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            background-color: #848;
            color: white;
            width: 500px;
            overflow: hidden;
            display: flex;
            padding-left: 60px;
            padding-right: 60px;
            align-items: center;
        }

        .rightObserver {
            width: calc(50% - 250px);
        }

        .notification {
            margin-top: 20px;
            width: 100%;
            height: 100px;
            display: flex;
            flex-direction: row;
        }

        .notification-text {
            margin: auto 0px;
            font-size: 40px;
            font-weight: bold;
            white-space: nowrap;
            transform: translateY(100px);
            transition: 2s ease-in-out;
            display: inline-block;
        }

        .notification-text.scroll-in {
            transform: translateY(0px);
        }

        .notification-text.scroll-left {
            transform: translateX(-100%) translateX(500px);
        }

        .notification-text.scroll-out {
            transform: translateX(-100%) translateX(500px) translateY(100px);
        }
    </style>
</head>

<body>
    <div class="notification">
        <div id="l" class="leftObserver"></div>
        <div class="centerObserver">
            <div class="notification-text"></div>
        </div>
        <div id="r" class="rightObserver"></div>
    </div>
    <div class="info">
        <div>This is a demo of animating a notifcation bar</div>
    </div>

    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
        integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
        crossorigin="anonymous"></script>
    <script>
        let notification = 'this is a super long text ;) .... with much info'
        $('.notification-text').on('transitionend', () => {
            kickstart();
        });

        let state = 0;
        function kickstart() {
            state++;
            console.log(`state = ${state}`);

            switch (state) {
                case 1:
                    $('.notification-text').removeClass('scroll-in scroll-left scroll-out');
                    $('.notification-text').addClass('scroll-in');
                    break;
                case 2:
                    setTimeout(() => {
                        $('.notification-text').removeClass('scroll-in scroll-left scroll-out');
                        $('.notification-text').addClass('scroll-left');
                    }, 2000);
                    break;
                case 3:
                    setTimeout(() => {
                        $('.notification-text').removeClass('scroll-in scroll-left scroll-out');
                        $('.notification-text').addClass('scroll-out');
                    }, 2000);
                    break;
                case 4:
                    $('.notification-text').removeClass('scroll-in scroll-left scroll-out');
                    state = 0;
                    break;
            }
        }
        $('.notification-text').text(notification);
        kickstart();


    </script>
</body>

</html>
