<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

    <title>Hello, world!</title>
    <style>
        .feature {
            width: 300px;
        }
    </style>
</head>

<body>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>

    <div class="feature">
        <h4>settings</h4>
        <div class="btn btn-secondary m-1 w-100" id="config-inspection">inspection: Yes</div>
        <div class="btn btn-secondary m-1 w-100" id="config-auto-scramble">auto-scramble: Yes</div>
        <div class="btn btn-secondary m-1 w-100" id="config-clear-log">clear-log</div>
    </div>


    <div class="feature">
        <h4>scramble</h4>
        <div id="scrambleText"></div>
        <button class="btn btn-secondary" id="newScramble">new</button>
        <button class="btn btn-success" id="ready">ready!</button>
    </div>

    <div class="feature">
        <h4>timer</h4>
        <div id="timerText">waiting..</div>
        <button class="btn btn-secondary" id="btnStart">start</button>
        <button class="btn btn-secondary" id="btnStop">stop</button>
    </div>
    <div class="feature">
        <h4>avg</h4>
        <div id="avgText"></div>
    </div>
    <div class="feature">
        <h4>log</h4>
        <div id="log"></div>
    </div>


    <script>
        let timelog = [
            31, 30, 29, 35, 39, 29, 30, 35, 36, 35, 41
        ];
        let startTime = 0;
        $('#btnStart').click(() => {
            $('#timerText').html('time is running...');
            startTime = new Date();
        });
        $('#btnStop').click(() => {
            let elapsedMs = (new Date() - startTime) / 1000;
            $('#timerText').html(`${(elapsedMs).toFixed(2)}`);
            addEntry(elapsedMs);
        });
        $('#newScramble').click(() => {
            newScramble();
        });
        function addEntry(time) {
            timelog.push(time);
            renderTimeLog();
        }
        function newScramble() {
            $('#scrambleText').empty();
            let operators = 'RLUDBF';
            let variant = ['', `'`, '2'];
            let scramble = '';
            for (let i = 0; i < 20; i++) {
                let idx = Math.floor((Math.random() * operators.length));
                scramble += operators[idx];
                idx = Math.floor((Math.random() * 3));
                scramble += variant[idx];
                scramble += ' ';
            }
            $('#scrambleText').append(`${scramble}`);
        }
        function renderTimeLog() {
            $('#log').empty();
            let maxItemsInUI = 5;
            let moreItemsInLog = timelog.length > maxItemsInUI;
            let logCount = moreItemsInLog ? maxItemsInUI : timelog.length;
            for (let i = 0; i < logCount; i++) {
                let t = timelog[timelog.length - i - 1];
                $('#log').append(`<div>${t}</div>`);
            }
            if (moreItemsInLog) {
                $('#log').append(`<div>...</div>`);
            }
            renderAvg();
        }
        function renderAvg() {
            let sum = timelog.reduce((previous, current) => current += previous);
            let avg = sum / timelog.length;
            $('#avgText').empty();
            $('#avgText').append(`<div>${avg}</div>`);
        }
        renderTimeLog();
        newScramble();
    </script>
</body>

</html>
