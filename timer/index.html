<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

        <link rel="stylesheet" type="text/css" href="style/animate.css">

    <title>Hello, world!</title>
    <style>
        .app {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .hotbar {
            position: absolute;
            top: 0px;
            right: 0px;
            z-index: 999;
        }

        .hotbar.collapsed {
            border: 0px solid #00ff00;
        }

        .hotbar.expanded {

            background-color: #a0a0a0;
            border: 0px solid #0000ff;
        }

        .box {
            border-radius: 20px;
            width: 50px;
            height: 50px;
        }

        #timer-component {
            border: 0px solid #ff0000;
            width: 100%;
            height: 100%;
        }

        #debug-log {
            height: 200px;
        }
    </style>
</head>

<body>
    <div id="app" class="app">
        <div id="hotbar-component" class="hotbar collapsed">
            <div id="hotbar-master">
                <div class="btn btn-warning btn-sm">
                    <h2>+</h2>
                </div>
            </div>
            <div id="hotbar-settings" style="animation-delay: 0.05s">
                <div class="btn btn-warning btn-sm">
                    <h2>S</h2>
                </div>
            </div>
            <div id="hotbar-scramble" style="animation-delay: 0.1s">
                <div class="btn btn-warning btn-sm">
                    <h2>C</h2>
                </div>
            </div>
            <div id="hotbar-log" style="animation-delay: 0.15s">
                <div class="btn btn-warning btn-sm">
                    <h2>L</h2>
                </div>
            </div>
        </div>
    </div>
    <div id="app-components" class="d-none">
        <div id="settings-component" class="hotbar expanded p-3">
            <div class="btn btn-secondary m-1 w-100" id="settings-inspection"></div>
            <div class="btn btn-secondary m-1 w-100" id="settings-auto-scramble"></div>
            <div class="btn btn-secondary m-1 w-100" id="settings-clear-log">clear-log</div>
            <div class="btn btn-primary float-right" id="settings-close">CLOSE</div>
            <pre id="debug-log">Log:
                </pre>
        </div>
        <div id="scramble-component" class="hotbar expanded p-3">
            <div id="scramble-text"></div>
            <button class="btn btn-secondary" id="scramble-new">new</button>
            <div class="btn btn-primary float-right" id="scramble-close">CLOSE</div>
        </div>
        <div id="timer-component">
            <div>
                <ul class="list-group m-auto w-50">
                    <li class="list-group-item active text-center">
                        <h1><span id="timer-header">waiting..</span></h1>
                    </li>
                    <li class="list-group-item">Time: <span id="timer-last"></span></li>
                    <li class="list-group-item">ao5: <span id="timer-ao5"></span></li>
                    <li class="list-group-item">ao12: <span id="timer-ao12"></span></li>
                </ul>
            </div>
        </div>
        <div id="log-component" class="hotbar expanded p-3">
            <pre id="log-text"></pre>
            <div class="btn btn-primary float-right" id="log-close">CLOSE</div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
    <script src="app/main.js"></script>
</body>

</html>
