<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

    <title>Hello, world!</title>
    <style>
        .feature {
            width: 300px;
        }
    </style>
</head>

<body>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>

    <div class="feature">
        <h4>settings</h4>
        <div class="btn btn-secondary m-1 w-100" id="settings-inspection"></div>
        <div class="btn btn-secondary m-1 w-100" id="settings-auto-scramble"></div>
        <div class="btn btn-secondary m-1 w-100" id="settings-clear-log">clear-log</div>
    </div>

    <div class="feature">
        <h4>scramble</h4>
        <div id="scramble-text"></div>
        <button class="btn btn-secondary" id="scramble-new">new</button>
    </div>

    <div class="feature">
        <h4>timer</h4>
        <div id="timerText">waiting..</div>
        <button class="btn btn-secondary" id="timer-start">start</button>
        <button class="btn btn-secondary" id="timer-stop">stop</button>
    </div>
    <div class="feature">
        <h4>avg</h4>
        <div id="avg-text"></div>
    </div>
    <div class="feature">
        <h4>log</h4>
        <pre id="log-text"></pre>
    </div>


    <script>
        let state = {
            timer: {
                startTime: null,
                log: []
            },
            scramble: {
                current: ''
            },
            settings: {
                inspection: false,
                autoScramble: false,
            }
        };

        function setState(s) {
            state = s;
            render();
        }

        [
            35, 39, 29, 30, 35, 36, 35, 41, 35, 36, 31, 32
        ].forEach(time => {
            newScramble();
            addEntry(time);
        });
        $('#settings-inspection').click(() => {
            setState(
                {
                    ...state,
                    settings: {
                        ...state.settings,
                        inspection: !state.settings.inspection
                    }
                }
            );
        });
        $('#settings-auto-scramble').click(() => {
            setState(
                {
                    ...state,
                    settings: {
                        ...state.settings,
                        autoScramble: !state.settings.autoScramble
                    }
                }
            );
        });
        $('#settings-clear-log').click(() => {
            setState(
                {
                    ...state,
                    timer: {
                        ...state.timer,
                        log: []
                    }
                }
            );
        });
        $('#timer-start').click(() => {
            setState({
                ...state,
                timer: {
                    ...state.timer,
                    startTime: new Date()
                }
            });
        });
        $('#timer-stop').click(() => {
            addEntry((new Date() - state.timer.startTime) / 1000);
            if (state.settings.autoScramble) {
                newScramble();
            }
        });
        $('#scramble-new').click(() => {
            newScramble();
        });
        function addEntry(elapsedMs) {
            const timerlog = [...state.timer.log];
            let entry = {
                time: elapsedMs,
                ao5: 0,
                ao12: 0,
                scramble: state.scramble.current
            };
            timerlog.push(entry);
            let ao = (num, arr) =>
                arr.length < num ? 0 :
                    arr.slice(arr.length - num)
                        .map(e => e.time)
                        .reduce((acc, cur) => acc + cur, 0) / num;
            entry.ao5 = ao(5, timerlog);
            entry.ao12 = ao(12, timerlog);
            setState({
                ...state,
                timer: {
                    ...state.timer,
                    startTime: null,
                    log: timerlog
                }
            });
        }

        function newScramble() {
            let operators = 'RLUDBF';
            let variant = ['', `'`, '2'];
            let scramble = '';
            for (let i = 0; i < 20; i++) {
                let idx = Math.floor((Math.random() * operators.length));
                scramble += operators[idx];
                idx = Math.floor((Math.random() * 3));
                scramble += variant[idx];
                scramble += ' ';
            }
            setState({
                ...state,
                scramble: {
                    ...state.scramble,
                    current: scramble
                }
            });

        }

        function render() {
            renderSettings();
            renderScramble();
            renderTimer();
            renderTimeLog();
            renderAvg();
        }

        function renderSettings() {
            let yesNo = (b) => b ? 'Yes' : 'No';
            $('#settings-inspection').html(`inspection: ${yesNo(state.settings.inspection)}`);
            $('#settings-auto-scramble').html(`auto scramble: ${yesNo(state.settings.autoScramble)}`);
        }

        function renderScramble() {
            $('#scramble-text').empty();
            $('#scramble-text').append(`${state.scramble.current}`);
        }

        function renderTimer() {
            if (state.timer.startTime !== null) {
                $('#timerText').html('time is running...');
                return;
            }
            if (state.timer.log.length === 0) {
                $('#timerText').html('no solves yet...');
                return;
            }
            const log = state.timer.log;
            const last = log[log.length - 1];
            $('#timerText').html(`${(last.time).toFixed(2)}`);
        }

        function renderTimeLog() {
            $('#log-text').empty();
            const timelog = state.timer.log;
            let index = timelog.length;
            timelog
                .slice(Math.max(0, timelog.length - 5))
                .reverse()
                .forEach(t => {
                    $('#log-text').append(`<div>${index--}, ${t.time.toFixed(2)}, ${t.ao5.toFixed(2)}, ${t.ao12.toFixed(2)}, ${t.scramble.substring(0, 8)}...</div>`);
                });
            if (timelog.length > 5) {
                $('#log-text').append(`<div>...</div>`);
            }
        }

        function renderAvg() {
            const timelog = state.timer.log;
            if (timelog.length === 0) {
                return;
            }
            const last = timelog[timelog.length - 1];
            $('#avg-text').empty();
            $('#avg-text').append(`<div>ao5=${last.ao5.toFixed(2)}, ao12=${last.ao12.toFixed(2)}</div>`);
        }

        newScramble();
    </script>
</body>

</html>
