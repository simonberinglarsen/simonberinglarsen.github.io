<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="google" content="notranslate">
    <meta charset="utf-8" />
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />

    <title>Vue Page Transition</title>

    <style>
        html {
            font-size: 24px;
            overflow: hidden;
        }

        #app {
            background-color: white;
            height: 100vh;
            width: 100vw;
        }

        .fa-10x {
            font-size: 10em;
        }
    </style>

    <!-- Required Stylesheets -->
    <link type="text/css" rel="stylesheet" href="https://unpkg.com/bootstrap/dist/css/bootstrap.min.css" />
    <link type="text/css" rel="stylesheet" href="https://unpkg.com/bootstrap-vue@latest/dist/bootstrap-vue.css" />

    <link type="text/css" rel="stylesheet" href="dist/vue-page-transition.css" />

    <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,600" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/9.5.0/styles/default.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/56639b13a6.js" crossorigin="anonymous"></script>
    <!-- Required scripts -->
    <script src="https://cdn.jsdelivr.net/npm/vue"></script>
    <script src="https://unpkg.com/babel-polyfill@latest/dist/polyfill.min.js"></script>
    <script src="https://unpkg.com/bootstrap-vue@latest/dist/bootstrap-vue.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue-router/3.0.3/vue-router.min.js"></script>
    <script src="dist/vue-page-transition.browser.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/9.15.6/highlight.min.js"></script>
    <script charset="UTF-8"
        src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/9.12.0/languages/javascript.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
            document.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightBlock(block);
            });
        });
    </script>
</head>

<body>
    <!-- Our application root element -->
    <div id="app">
        <vue-page-transition name="fade">
            <router-view />
        </vue-page-transition>
    </div>
    <!-- Start running your app -->
    <script>
        var home = Vue.component('home', {
            template: `
            <div>
                <div @click="router.push('/timer')" class="card shadow-lg m-5 text-center">
                    <i class="fa fa-10x fa-clock-o bg-success p-2"></i>
                    <div class="card-body">
                        <p class="card-text"><h1>Timer</h1></p>
                    </div>
                </div>
                <div @click="router.push('/log')" class="card shadow-lg m-5 text-center">
                    <i class="fa fa-10x fa-clipboard-list bg-warning p-2"></i>
                    <div class="card-body">
                        <p class="card-text"><h1>Log</h1></p>
                    </div>
                </div>
                <div @click="router.push('/settings')" class="card shadow-lg m-5 text-center">
                    <i class="fa fa-10x fa-cog bg-secondary p-2"></i>
                    <div class="card-body">
                        <p class="card-text"><h1>Settings</h1></p>
                    </div>
                </div>
            </div>
        `,
            methods: {
               
            },
            data() {
                return {
                    name: "Donald"
                };
            },
        })

        var timerPage = Vue.component('timer-page', {
            template: `
            <div>
                <div @click="router.push('/')" class="card shadow-lg m-5 text-center">
                    <i class="fa fa-10x fa-cube bg-danger p-2"></i>
                    <div class="card-body">
                        <p class="card-text"><h1>Home</h1></p>
                    </div>
                </div> 
            </div>
        `
        })

        var settingsPage = Vue.component('settings-page', {
            template: `
            <div>
                <div @click="router.push('/')" class="card shadow-lg m-5 text-center">
                    <i class="fa fa-10x fa-cube bg-danger p-2"></i>
                    <div class="card-body">
                        <p class="card-text"><h1>Home</h1></p>
                    </div>
                </div> 
            </div>
        `
        })

        var logPage = Vue.component('log-page', {
            template: `
            <div>
                <div @click="router.push('/')" class="card shadow-lg m-5 text-center">
                    <i class="fa fa-10x fa-cube bg-danger p-2"></i>
                    <div class="card-body">
                        <p class="card-text"><h1>Home</h1></p>
                    </div>
                </div> 
            </div>
        `
        })

        var router = new VueRouter({
            routes: [
                {
                    path: '/',
                    name: 'Vue Page Transition',
                    component: home,
                    meta: { transition: 'fade-in-up' },
                },
                {
                    path: '/timer',
                    name: 'Timer',
                    component: timerPage,
                    meta: { transition: 'fade-in-right' },
                },
                {
                    path: '/log',
                    name: 'Log',
                    component: logPage,
                    meta: { transition: 'fade-in-right' },
                },
                {
                    path: '/settings',
                    name: 'Settings',
                    component: settingsPage,
                    meta: { transition: 'fade-in-right' },
                },
            ]
        })

        Vue.use(VuePageTransition)

        window.app = new Vue({
            el: '#app',
            router,
        })
    </script>
</body>

</html>
