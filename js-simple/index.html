<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        const pathText = 'A, B, C, D, E, K';
        const subPath = {
            'A': ['a1', 'a2', 'a3'],
            'B': ['b1', 'b2'],
            'C': ['c1', 'c2', 'c3'],
            'D': ['d1', 'd2'],
            'E': ['e1', 'e2', 'e3', 'e4'],
            'K': ['k1', 'k2', 'k3'],
        };
        const path = pathText.split(',').map(t => t.trim());
        
        const rec = (path, temp, output) => {
            if(path.length ===0 ) {
                output.push(temp);
                return;
            }
            const first = path.shift();
            const subPaths = subPath[first];
            subPaths.forEach(subPath =>  {
                temp.push(subPath);
                rec(path, [...temp], output);
                temp.pop();
            });
            path.unshift(first);
        }

        const output = [];
        rec(path, [], output);
        console.log(`All results : ${output.length}`)
        //output.forEach(o => console.log(o));

    </script>

</body>

</html>
