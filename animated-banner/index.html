<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            background: #fff;
        }

        .banner {
            padding: 60px 0px;
            background: #fff;
            display: flex;
            flex-direction: row;
            justify-content: center;
        }

        .slot {
            overflow: visible;
        }


        .slot img {
            display: block;
            width: 180px;
            height: auto;
        }

        .pop {
            transform: scale(1.2);
            z-index: 10;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 1);
        }

        @keyframes bounce {
            from {
                transform: translateY(0px) scale(1.2);
            }

            to {
                transform: translateY(10px) scale(1.2);
            }
        }

        .bounce {
            animation-name: bounce;
            animation-direction: alternate;
            animation-duration: 1s;
            animation-iteration-count: infinite;
            animation-timing-function: ease-out;
        }

        .itemsContainer:hover .play {
            display: block;
            opacity: 1;
            height: 150px;
            width: 150px;
            left: 50%;
            margin-left: -75px;
            top: 50%;
            margin-top: -75px;
            cursor: pointer;
        }

        .play {
            transform: scale(0.5);
            display: none;
            opacity: 0;
            position: absolute;
            top: 0px;
            right: 0px;
            z-index: 100;
        }



        /*---------------*/


        .show {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150px;
            height: 40px;
            margin-top: -20px;
            margin-left: -75px;
            background: #e74c3c;
            border-radius: 5px;
            border: 0;
            border-bottom: 2px solid #c0392b;
            cursor: pointer;
        }

        .show:hover {
            background: #c0392b;
        }

        .show:active {
            transform: scale(0.9);
        }

        .mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 50;
            visibility: hidden;
            opacity: 0;
            transition: 0.7s;
        }

        .modal {
            padding: 20px;
            position: fixed;
            border-radius: 10px;
            top: 50%;
            left: 50%;
            width: 50vw;
            height: 600px;
            margin-left: -25vw;
            margin-top: -300px;
            background: #000;
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            transition: 0.5s ease-out;
            transform: translateY(45px);
        }

        .active {
            visibility: visible;
            opacity: 1;
        }

        .active+.modal {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
        }

        .center {
            width: 100%;
            height: 100%;
        }

        video:focus {
            outline: none;
        }

        /*--------------*/

        .spacer {
            margin-top: 60px;
        }
    </style>
</head>

<body>
    <div class="spacer"></div>
    <div class="banner"></div>
    <div class="spacer"></div>


    <div class="mask" role="dialog"></div>
    <div class="modal" role="alert">
        <video id="modalVideo" class="center" controls>
        </video>
    </div>


    <!-- script goes here -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script>
        let configs = [
            [
                { imgId: '1' },
                { imgId: '2' }
            ],
            [
                { imgId: '3', pop: true, videoLink: 'https://www.nopixglobal.com/media/video/b0/56/00/Test.mp4' },
                { imgId: '4' }
            ],
            [
                { imgId: '5' },
                { imgId: '6' }
            ],
            [
                { imgId: '7' },
                { imgId: '8' }
            ],
            [
                { imgId: '9' },
                { imgId: '10' }
            ],
            [
                { imgId: '11' },
                { imgId: '12', pop: true, videoLink: 'http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4' }
            ],
            [
                { imgId: '13' },
                { imgId: '14' }
            ],
            [
                { imgId: '15' },
                { imgId: '16' }
            ],
        ];

        let banner = $('.banner');
        configs.forEach((config, i) => {
            let slot = $('<div class="slot"></div>');
            slot.css({ 'margin-top': 60 * (i % 2) });
            const createImg = (cfg) => {
                let imgId = cfg.imgId;
                let videoLink = cfg.videoLink;
                let pop = cfg.pop;
                let e = $(`<img src="assets/${imgId}.png">`);
                if (pop) {
                    let container = $('<div class="itemsContainer"></div>');
                    container.addClass('pop animated bounce');
                    container.css({ 'animation-delay': `${Math.floor(Math.random() * 10) / 10}s` })
                    container.append(e);
                    container.append('<img class="play" src="assets/button.png">');
                    container.click(() => {
                        $(".mask").addClass("active");
                        $("#modalVideo")[0].pause();
                        $("#modalVideo").html(`<source src="${videoLink}" type="video/mp4">`);
                        $("#modalVideo")[0].load();
                        $("#modalVideo")[0].play();

                    });
                    e = container;
                }
                return e;
            };
            let img1 = createImg(config[0]);
            let img2 = createImg(config[1]);
            slot.append(img1);
            slot.append(img2);
            banner.append(slot);
        });

        $(".mask").on("click", function () {
            $(".mask").removeClass("active");
            $("#modalVideo")[0].pause();
        });


    </script>
</body>

</html>
