<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            background: #fff;
        }

        .banner {
            background: #fff;
            display: flex;
            flex-direction: row;
            justify-content: center;
        }

        .banner-videos {
            display: flex;
            flex-direction: row;
            width: 100%;
            position: absolute;
            z-index: 50;
            justify-content: space-around;
        }

        .banner-videos-img {
            box-shadow: 0px 3px 15px rgba(0, 0, 0, 1);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
        }

        .slot {
            overflow: visible;
        }


        .slot img {
            display: block;
            width: 180px;
            height: auto;
        }

        .play {
            transform: scale(0.5);
            display: none;
            opacity: 0;
            position: absolute;
            top: 0px;
            right: 0px;
            z-index: 100;
        }



        /*---------------*/


        .show {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150px;
            height: 40px;
            margin-top: -20px;
            margin-left: -75px;
            background: #e74c3c;
            border-radius: 5px;
            border: 0;
            border-bottom: 2px solid #c0392b;
            cursor: pointer;
        }

        .show:hover {
            background: #c0392b;
        }

        .show:active {
            transform: scale(0.9);
        }

        .mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 50;
            visibility: hidden;
            opacity: 0;
            transition: 0.7s;
        }

        .modal {
            padding: 20px;
            position: fixed;
            border-radius: 10px;
            top: 50%;
            left: 50%;
            width: 50vw;
            height: 600px;
            margin-left: -25vw;
            margin-top: -300px;
            background: #000;
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            transition: 0.5s ease-out;
            transform: translateY(45px);
        }

        .active {
            visibility: visible;
            opacity: 1;
        }

        .active+.modal {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
        }

        .center {
            width: 100%;
            height: 100%;
        }

        video:focus {
            outline: none;
        }

        /*--------------*/

        .spacer {
            height: 60px;
            background-color: #eee;
        }

        .mt-1 {
            margin-top: 50px;
        }

        .mt-2 {
            margin-top: 100px;
        }

        .mt-3 {
            margin-top: 150px;
        }

        
        .play-button {
            cursor: pointer;
            position:absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            -webkit-transform: translate(-50%, -50%);
            z-index: 1000;
        }
      
        /*  animation */
        .bounce {
            animation-name: bounce;
            animation-direction: alternate;
            animation-duration: 1s;
            animation-iteration-count: infinite;
            animation-timing-function: ease-out;
        }

        @keyframes bounce {
            from {
                transform: translateY(0px);
            }
            to {
                transform: translateY(10px);
            }
        }

        .anim {
            animation-duration: 2s;
            animation-fill-mode: forwards;
            animation-timing-function: ease-out;
        }

        .anim.left {
            animation-name: key-anim-left;
        }

        .anim.right {
            animation-name: key-anim-right;
        }

        .anim.up {
            animation-name: key-anim-up;
        }

        .anim.down {
            animation-name: key-anim-down;
        }

        @keyframes key-anim-left {
            from {
                transform: translateX(-100px);
                opacity: 0
            }

            to {
                transform: translateX(0%);
                opacity: 1
            }
        }

        @keyframes key-anim-right {
            from {
                transform: translateX(100px);
                opacity: 0
            }

            to {
                transform: translateX(0%);
                opacity: 1
            }
        }

        @keyframes key-anim-up {
            from {
                transform: translateY(-100px);
                opacity: 0
            }

            to {
                transform: translateX(0%);
                opacity: 1
            }
        }

        @keyframes key-anim-down {
            from {
                transform: translateY(-100px);
                opacity: 0
            }

            to {
                transform: translateX(0%);
                opacity: 1
            }
        }

    </style>
</head>

<body>
    <div class="spacer"></div>
    <div class="banner">
        <div class="banner-videos">
            <div class="banner-videos-container mt-1">
                <div id="play1" class="play-button"> 
                    <img src="assets/button.png"> 
                </div>
                <img class="banner-videos-img" src="assets/V1.png">
            </div>
            <div class="banner-videos-container mt-3">
                <div id="play2" class="play-button"> 
                    <img src="assets/button.png"> 
                </div>
                <img class="banner-videos-img" src="assets/V2.png">
            </div>
            <div class="banner-videos-container mt-1">
                <div id="play3" class="play-button"> 
                    <img src="assets/button.png"> 
                </div>
                <img class="banner-videos-img" src="assets/V3.png">
            </div>
        </div>
        <!-- http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4
 -->

        
        <div class="slot mt-1">
            <img src="assets/1.png">
            <img src="assets/2.png">
        </div>
        <div class="slot">
            <img src="assets/3.png">
            <img src="assets/4.png">
        </div>
        <div class="slot mt-1">
            <img src="assets/5.png">
            <img src="assets/6.png">
        </div>
        <div class="slot">
            <img src="assets/7.png">
            <img src="assets/8.png">
        </div>
        <div class="slot mt-1">
            <img src="assets/9.png">
            <img src="assets/10.png">
        </div>
        <div class="slot">
            <img src="assets/11.png">
            <img src="assets/12.png">
        </div>
        <div class="slot mt-1">
            <img src="assets/13.png">
            <img src="assets/14.png">
        </div>
        <div class="slot">
            <img src="assets/15.png">
            <img src="assets/16.png">
        </div>
    </div>
    <div class="spacer"></div>

   
    <div class="mask" role="dialog"></div>
    <div class="modal" role="alert">
        <video id="modalVideo" class="center" controls>
        </video>
    </div>


    <!-- script goes here -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script>
        $('.slot > img').each((i, e) => {
            entrance(e);
        });

        $('.banner-videos-container').each((i,e) => {
            entrance(e);
        });

        $('.banner-videos-img').each((i,e) => {
            const delay = Math.floor(Math.random() * 1000);
            setTimeout(() => {$(e).addClass('bounce')}, delay);
        });


        function entrance(e) {
            const directions = ['left', 'right', 'up', 'down'];
            const rndDirection = directions[Math.floor(Math.random() * directions.length)];
            $(e).css({ opacity: 0 });
            const delay = Math.floor(Math.random() * 1000);
            setTimeout(() => { $(e).addClass(`anim ${rndDirection}`) }, delay);

        }

        /* MODEL close */
        $('.play-button').on('click', function () {
            $('.mask').removeClass('active');
            $('#modalVideo')[0].pause();
        });

        $('.mask').on('click', function () {
            $('.mask').removeClass('active');
            $('#modalVideo')[0].pause();
        });

        $('#play1').on('click', function () {
            showModal('http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4');
        });
        $('#play2').on('click', function () {
            showModal('http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4');
        });
        $('#play3').on('click', function () {
            showModal('http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4');
        });

        function showModal(videoLink) {
            let q = $('.mask');
            q.addClass('active');
            $('#modalVideo').html(`<source src='${videoLink}' type='video/mp4'>`);
            $('#modalVideo')[0].load();
            $('#modalVideo')[0].play();

        }
    </script>
</body>

</html>
