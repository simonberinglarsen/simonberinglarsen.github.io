<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            background: #888;
        }

        .spacer {
            height: 60px;
            background-color: #888;
        }

        /* animated banner classes */

        .aniban-banner {
            background: #fff;
            display: flex;
            flex-direction: row;
            justify-content: center;
        }

        .aniban-banner-videos {
            display: flex;
            flex-direction: row;
            width: 100%;
            position: absolute;
            z-index: 50;
            justify-content: space-around;
        }

        .aniban-play-overlay>img {
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 1);
            overflow: hidden;
            border-radius: 10px;
            border: 2px solid white;
        }

        .aniban-slot img {
            display: block;
            width: 180px;
            height: auto;
        }

        .aniban-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 50;
            visibility: hidden;
            opacity: 0;
            transition: 0.7s;
        }

        .aniban-modal {
            padding: 20px;
            position: fixed;
            border-radius: 10px;
            top: 50%;
            left: 50%;
            width: 50vw;
            height: 600px;
            margin-left: -25vw;
            margin-top: -300px;
            background: #000;
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            transition: 0.5s ease-out;
            transform: translateY(45px);
        }

        .aniban-active {
            visibility: visible;
            opacity: 1;
        }

        .aniban-active+.aniban-modal {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
        }

        .aniban-center {
            width: 100%;
            height: 100%;
        }

        video:focus {
            outline: none;
        }

        .aniban-mt-1 {
            margin-top: 50px;
        }

        .aniban-mt-2 {
            margin-top: 100px;
        }

        .aniban-mt-3 {
            margin-top: 150px;
        }

        .aniban-play-button {
            cursor: pointer;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            -webkit-transform: translate(-50%, -50%);
            z-index: 1000;
        }

        /*  animation */
        .aniban-bounce {
            animation-name: aniban-bounce;
            animation-direction: alternate;
            animation-duration: 1s;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
        }

        @keyframes aniban-bounce {
            from {
                transform: translateY(0px);
            }

            to {
                transform: translateY(10px);
            }
        }

        .aniban-anim {
            animation-duration: 2s;
            animation-fill-mode: forwards;
            animation-timing-function: ease-out;
        }

        .aniban-anim.left {
            animation-name: key-aniban-left;
        }

        .aniban-anim.right {
            animation-name: key-aniban-right;
        }

        .aniban-anim.up {
            animation-name: key-aniban-up;
        }

        .aniban-anim.down {
            animation-name: key-aniban-down;
        }

        @keyframes key-aniban-left {
            from {
                transform: translateX(-100px);
                opacity: 0
            }

            to {
                transform: translateX(0%);
                opacity: 1
            }
        }

        @keyframes key-aniban-right {
            from {
                transform: translateX(100px);
                opacity: 0
            }

            to {
                transform: translateX(0%);
                opacity: 1
            }
        }

        @keyframes key-aniban-up {
            from {
                transform: translateY(-100px);
                opacity: 0
            }

            to {
                transform: translateX(0%);
                opacity: 1
            }
        }

        @keyframes key-aniban-down {
            from {
                transform: translateY(-100px);
                opacity: 0
            }

            to {
                transform: translateX(0%);
                opacity: 1
            }
        }
    </style>
</head>

<body>
    <div class="spacer"></div>
    <div class="aniban-banner">
        <div class="aniban-banner-videos">

        </div>
        <div class="aniban-slot aniban-mt-1">

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script>
        (function AnimatedBannerModule() {
            function randomEntrance(e) {
                const directions = ['left', 'right', 'up', 'down'];
                const rndDirection = directions[Math.floor(Math.random() * directions.length)];
                const delay = Math.floor(Math.random() * 1000);
                entrance(e, rndDirection, delay);
            }
            function entrance(e, rndDirection, delay) {
                $(e).css({ opacity: 0 });
                setTimeout(() => { $(e).addClass(`aniban-anim ${rndDirection}`) }, delay);
            }
            function setupEvents(videos) {
                videos.forEach((v, i) => {
                    const playId = `btn-play-${i}`;
                    $('.aniban-banner-videos').append($(`
                        <div class="aniban-banner-videos-container aniban-mt-2">
                            <div class="aniban-play-overlay">
                                <div id="${playId}" class="aniban-play-button">
                                    <img src="assets/button.png">
                                </div>
                                <img src="${v.img}">
                            </div>
                        </div>`));
                    $(`#${playId}`).on('click', function () {
                        showModal(v.videoLink);
                    });
                });
                $('.aniban-mask').on('click', function () {
                    $('.aniban-mask').removeClass('aniban-active');
                    $('#modalVideo')[0].pause();
                });
            }
            function showModal(videoLink) {
                let q = $('.aniban-mask');
                q.addClass('aniban-active');
                $('#modalVideo').html(`<source src='${videoLink}' type='video/mp4'>`);
                $('#modalVideo')[0].load();
                $('#modalVideo')[0].play();
            }
            function startAnimations() {
                $('.aniban-slot > img').each((i, e) => { randomEntrance(e); });
                $('.aniban-banner-videos-container').each((i, e) => { entrance(e, 'down', 2000); });
                $('.aniban-play-overlay').each((i, e) => {
                    const delay = 700 * i;
                    setTimeout(() => { $(e).addClass('aniban-bounce') }, delay);
                });
            }
            setupEvents(
                [
                    { img: 'assets/V1b.png', videoLink: 'http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4' },
                    { img: 'assets/V2b.png', videoLink: 'http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4' },
                    { img: 'assets/V3b.png', videoLink: 'http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4' },
                ]
            );
            startAnimations();
        })();
    </script>
