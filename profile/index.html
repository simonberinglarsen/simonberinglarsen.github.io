<!DOCTYPE html>
<html>

<head>
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
        integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.0.0/animate.min.css" />
    <style>
        @font-face {
            font-family: 'open sans';
            src: url('OpenSans-Regular.ttf');
        }

        * {
            margin: 0px;
            padding: 0px;
        }

        html,
        body {
            width: 100vw;
            overflow-x: hidden;
            font-family: 'open sans', Fallback, sans-serif;
            font-size: 1.5rem;
            color: rgb(42, 123, 152);
            line-height: 3.0rem;
        }

        .badge {
            font-size: 0.75rem;
            padding: 10px;
            border-radius: 0.25rem;
            margin: 0.5rem;
            box-shadow: 0px 3px 15px rgba(0, 0, 0, 0.2);
        }

        .bg-green {
            background-color: rgb(42, 123, 152);
        }

        .fg-white {
            color: white;
        }

        body {
            position: relative;
        }

        .mb-1 {
            margin-bottom: 2.0rem;
        }

        .px-1 {
            padding-left: 2.0rem;
            padding-right: 2.0rem;
        }

        .item-1 {
            background-color: #eee;

        }


        .item-2 {
            background-color: #fff;

        }

        .item-3 {
            background-color: #faa;

        }

        .item-4 {
            background-color: #fff;

        }

        .item-5 {
            background-color: rgb(248,214,18);


        }

        .item-6 {
            background-color: #fff;

        }


        .item-7 {
            height: 125vh;
            background-color: #fff;
        }

        .block {
            height: 60vh;
            padding-top: 10vh;
            padding-bottom: 10vh;
            border-bottom: 1rem dotted #fff;
            border-top: 1rem dotted #fff;
        }

        .flex {
            display: flex;
        }

        .flex-column {
            flex-direction: column;
        }

        .center {
            margin-left: auto;
            margin-right: auto;
        }

        img {
            display: block;
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            margin: 0 auto;
        }

        .circle {
            display: block;
            width: 150px;
            height: 250px;
            margin: 1rem auto;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            -webkit-border-radius: 1rem;
            -moz-border-radius: 1rem;
            border-radius: 1rem;
            border: 4px solid #fff;
            box-shadow: 0px 3px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>
    
    <div class="block item-1">
        <img class="center animate__animated" src="p1.svg" />
    </div>
    <div class="block item-2">
        <img class="center animate__animated" src="p2.svg" />
    </div>
    <div class="block item-3">
        <img class="center animate__animated" src="p3.svg" />
    </div>
    <div class="block item-4">
        <img class="center animate__animated" src="p5.svg" />
    </div>
    <div class="block item-5">
        <img class="center animate__animated" src="p4.svg" />
    </div>
    <div class="block item-6">
        <img class="center animate__animated" src="p6.svg" />
    </div>

    <div class="item-7 flex flex-column">
        <div class="center">
            Hi, I'm <strong>Simon</strong>
        </div>
        <div class="center">
            <div class="circle" style="background-image:url('profile200.jpg')"></div>
        </div>
        <div class="center">
            I do <strong>web</strong>:
        </div>
        <div class="center">
            <span class="badge mb-1">html5</span>,
            <span class="badge mb-1">css</span>,
            <span class="badge mb-1">angular</span>,
            <span class="badge mb-1">jQuery</span>
        </div>
        <div class="center">
            I do <strong>code</strong>:
        </div>
        <div class="center">
            <span class="badge mb-1">javascript</span>,
            <span class="badge mb-1">typescript</span>,
            <span class="badge mb-1">c++</span>,
            <span class="badge mb-1">c#</span>,
            <span class="badge mb-1">php</span>,
            <span class="badge mb-1">shell</span>,
            <span class="badge mb-1">batch</span>
        </div>
        <div class="center">
            I do <strong>graphics</strong>
        </div>
        <div class="center">
            <span class="badge mb-1">inkscape</span>,
            <span class="badge mb-1">gimp</span>,
            <span class="badge mb-1">svg</span>,
            <span class="badge mb-1">eps</span>,
            <span class="badge mb-1">png</span>,
            <span class="badge mb-1">jpg</span>,
            <span class="badge mb-1">pdf</span>
        </div>
        <div class="center mb-1">
            ...and <strong>finally</strong> I'm...
        </div>
        <div class="center mb-1">
            <span class="badge mb-1 bg-green fg-white border px-1">C R E A T I V E</span>
        </div>
        <div class="center">
            ( well :-), I also do <strong>simple tasks</strong> )
        </div>
    </div>
    <script type="module">
        import { App } from './app.mjs';
        var app = new App();
        app.run();
    </script>
</body>

</html>
